function h(row, key) {
  const header = HEADER_MAP[key];
  if (!header || !row) return "—";
  return row[header] || "—";
}
function fmtTrainingDate(raw) {
  if (!raw || raw === "—") return "—";
  // Handle ISO format (2025-02-14)
  const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (iso) return `${iso[3]}/${iso[2]}/${iso[1]}`;
  // Handle Date objects or parseable strings
  const d = new Date(raw);
  if (!isNaN(d.getTime())) {
    const day   = String(d.getDate()).padStart(2, "0");
    const month = String(d.getMonth() + 1).padStart(2, "0");
    return `${day}/${month}/${d.getFullYear()}`;
  }
  return raw; // fallback — return as-is
}
function mapRow(headers, row) {
  const obj = {};
  headers.forEach((header, i) => { obj[header] = row[i] || ""; });
  return obj;
}
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else { cur += ch; }
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || "").replace(/^"|"$/g, ""); });
    return obj;
  });
}

//   ✓ Include? | Street Settings Category | Area of Street | What It Involves (Trainer Detail)

const DEPT_FILTER_MAP = {
  "Sales":              ["sales", "pipeline", "offer", "applicant", "memo", "progression", "vendor", "buyer"],
  "Lettings":           ["letting", "tenancy", "tenant", "landlord", "renewal", "move-in", "move-out", "application"],
  "Both":               ["both", "settings", "properties", "valuations", "viewings", "general", "ai", "integration", "app", "portal", "notification", "brand", "user", "calendar", "enquiry", "report", "partner", "payment"],
  "Property Management":["property management", "maintenance", "contractor", "inspection", "certificate", "key", "pm"],
  "Accounting":         ["account", "invoice", "ledger", "rent", "reconcil", "statement", "nrl", "arrears", "suspense", "dormant", "charge", "receipt"],
};

function buildAgendaFromAreas(areasStr, agendaData) {
  if (!agendaData.length) return [];

  const requested = (areasStr && areasStr !== "—")
    ? areasStr.split(/,|;|\n/).map(s => s.trim().toLowerCase()).filter(Boolean)
    : [];

  // Determine which sheet dept columns to include
  const deptMatch = dept => {
    if (!requested.length) return true; // show all if nothing specified
    const keywords = DEPT_FILTER_MAP[dept] || [];
    return requested.some(r =>
      keywords.some(k => r.includes(k) || k.includes(r)) ||
      dept.toLowerCase().includes(r) ||
      r.includes(dept.toLowerCase())
    );
  };

  const grouped = {};
  agendaData.forEach(row => {
    const category = (row["Street Settings Category"] || "").trim();
    const area     = (row["Area of Street"] || "").trim();
    if (!area || !category) return;

    const dept     = (row["Sales / Lettings / Both / PM / Accts"] ||
                      row["Sales /\nLettings / Both"] ||
                      row["Sales / Lettings / Both"] || "Both").trim();
    const areaLow  = area.toLowerCase();
    const catLow   = category.toLowerCase();

    // Match against requested areas OR against dept keywords
    const directMatch = requested.some(r =>
      areaLow.includes(r) || r.includes(areaLow) ||
      catLow.includes(r)  || r.includes(catLow)  ||
      r.split(" ").some(w => w.length > 3 && (areaLow.includes(w) || catLow.includes(w)))
    );
    const matches = !requested.length || directMatch || deptMatch(dept);

    if (matches) {
      const groupKey = category;
      if (!grouped[groupKey]) grouped[groupKey] = { dept, items: [] };
      const involves = row["What It Involves (Trainer Detail)"] || row["What it Involves:"] || "";
      const why      = row["Why It Matters to the Client (Client Pitch)"] || row["Why It Matters to the Client\n(Client Pitch)"] || "";
      const duration = row["Typical Training\nDuration"] || row["Typical Training Duration"] || "";
      grouped[groupKey].items.push({ item: area, involves, why, duration, category, dept });
    }
  });

  return Object.entries(grouped).map(([cat, { dept, items }]) => ({ area: cat, dept, items }));
}

// Auto-derive primary training theme from areas string
function deriveTheme(areasStr) {
  if (!areasStr || areasStr === "—") return "General";
  const s = areasStr.toLowerCase();
  const scores = { "Accounting": 0, "Lettings": 0, "Sales": 0, "Reporting": 0, "Property Management": 0 };
  if (s.includes("account") || s.includes("invoice") || s.includes("ledger") || s.includes("debt") || s.includes("nrl") || s.includes("receipt") || s.includes("reconcil")) scores["Accounting"] += 3;
  if (s.includes("letting") || s.includes("tenancy") || s.includes("landlord") || s.includes("tenant") || s.includes("renewal") || s.includes("application")) scores["Lettings"] += 3;
  if (s.includes("sales") || s.includes("pipeline") || s.includes("offer") || s.includes("applicant") || s.includes("memo") || s.includes("progression")) scores["Sales"] += 3;
  if (s.includes("report") || s.includes("dashboard") || s.includes("analytics")) scores["Reporting"] += 3;
  if (s.includes("property management") || s.includes("maintenance") || s.includes("contractor") || s.includes("inspection") || s.includes("certificate") || s.includes(" pm") || s.includes("pm ")) scores["Property Management"] += 3;
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  if (sorted[0][1] === 0) return "General Optimisation";
  if (sorted[0][1] === sorted[1][1] && sorted[1][1] > 0) return `${sorted[0][0]} & ${sorted[1][0]}`;
  return `${sorted[0][0]} Driven`;
}

// ─── RISK FLAG LOGIC ──────────────────────────────────────────────────────
function getRiskLevel(notes) {
  const high = notes.adoptionRisk === "High" || notes.adoptionRisk === "Critical" || notes.escalation === "Yes — urgent" || notes.escalation === "High";
  const med = notes.adoptionRisk === "Medium" || notes.escalation === "Yes — within 7 days" || notes.escalation === "Medium";
  if (high) return "high";
  if (med) return "medium";
  return "low";
}
function getRiskStyle(level) {
  if (level === "high") return { bg: C.red, color: C.redDark, border: "#f9b4bc", label: "HIGH RISK — action required" };
  if (level === "medium") return { bg: C.amber, color: C.amberDark, border: "#f1c238", label: "MEDIUM RISK — monitor closely" };
  return { bg: C.greenBg, color: C.greenDark, border: "#7bc97a", label: "LOW RISK — on track" };
}

function EditableBulletList({ items, onChange, placeholder = "Add item…" }) {
  const add = () => onChange([...items, ""]);
  const update = (i, v) => { const n = [...items]; n[i] = v; onChange(n); };
  const remove = (i) => onChange(items.filter((_, j) => j !== i));
  return (
    <div>
      {items.map((item, i) => (
        <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 8, marginBottom: 6 }}>
          <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.blue, marginTop: 8, flexShrink: 0 }} />
          <input type="text" value={item} onChange={e => update(i, e.target.value)} placeholder={placeholder}
            style={{ flex: 1, border: "none", borderBottom: `1px dashed ${C.yellow}`, padding: "3px 0", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: "transparent", outline: "none" }} />
          <button className="no-print" onClick={() => remove(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.dark20, fontSize: 14, padding: "0 2px", flexShrink: 0 }}>×</button>
        </div>

  );
}

function buildClientObjectives(areasStr, prioritiesStr) {
  const s = (areasStr || "").toLowerCase();
  const objectives = [];
  const hasSales    = s.includes("sales") || s.includes("pipeline") || s.includes("offer") || s.includes("applicant") || s.includes("memo") || s.includes("progression");
  const hasLettings = s.includes("letting") || s.includes("tenancy") || s.includes("landlord") || s.includes("application") || s.includes("renewal");
  const hasAccounts = s.includes("account") || s.includes("invoice") || s.includes("ledger") || s.includes("debt") || s.includes("receipt") || s.includes("nrl") || s.includes("reconcil");
  const hasPM       = s.includes("property management") || s.includes("maintenance") || s.includes("contractor") || s.includes("inspection") || s.includes("certificate");
  const hasReporting= s.includes("report") || s.includes("dashboard") || s.includes("analytics");
  const hasSettings = s.includes("settings") || s.includes("onboarding") || s.includes("portal") || s.includes("brand") || s.includes("user") || s.includes("notification");
  objectives.push("Ensure your team is utilising Street to its full capacity" +
    (hasSales && hasLettings ? " across Sales and Lettings" : hasSales ? " across Sales" : hasLettings ? " across Lettings" : "") + ".");
  if (hasSettings) objectives.push("Configure the platform correctly so every workflow, notification and portal feed behaves as expected.");
  if (hasLettings && hasAccounts) objectives.push("Strengthen confidence in the full lettings and accounting workflow.");
  if (hasAccounts) objectives.push("Improve visibility and control over money movement, arrears and landlord statements.");
  if (hasPM) objectives.push("Streamline property management workflows including maintenance, contractors, inspections and compliance.");
  if (hasReporting) objectives.push("Build confidence in reporting and dashboard use for management oversight.");
  objectives.push("Identify opportunities to streamline admin and reduce manual duplication.");
  if (hasSales && hasLettings) objectives.push("Align Sales and Lettings processes to support smoother cross-team handovers.");
  if (prioritiesStr && prioritiesStr !== "—") {
    const extras = prioritiesStr.split(/\n/).map(s => s.replace(/^\d+\.\s*/, "").trim()).filter(Boolean);
    extras.forEach(e => { if (!objectives.some(o => o.toLowerCase().includes(e.toLowerCase().slice(0, 20)))) objectives.push(e); });
  }
  return objectives;
}

  const selected    = notes.agendaSections !== undefined ? notes.agendaSections : defaultSelected;
  const isSelected  = key => selected.includes(key);
  const toggle      = key => sn("agendaSections")(isSelected(key) ? selected.filter(k => k !== key) : [...selected, key]);
  const toggleAll   = () => sn("agendaSections")(selected.length === ALL_SECTIONS.length ? [] : defaultSelected);

  // Map each module name to the CLIENT_AGENDA index (and "ops" for Settings)
  const MODULE_AGENDA_INDEX = {
    "Settings & Core Platform": 0,
    "Sales": 1,
    "Lettings": 2,
    "Property Management": 3,
    "Accounting": 4,
  };

  // Get all section keys that belong to a given module
  const sectionKeysForModule = m => {
    const di = MODULE_AGENDA_INDEX[m];
    if (di === undefined) return [];
    const agenda = CLIENT_AGENDA[di];
    if (!agenda) return [];
    const keys = agenda.sections.map((_, si) => `d${di}s${si}`);
    // "Settings & Core Platform" also owns the "ops" section
    if (m === "Settings & Core Platform") keys.push("ops");
    return keys;
  };

  // Toggle a module — cascades to all its child agenda sections
  const toggleModule = m => {
    const nowSelected = selectedModules.includes(m);
    const newModules  = nowSelected ? selectedModules.filter(x => x !== m) : [...selectedModules, m];
    sn("selectedModules")(newModules);

    const childKeys = sectionKeysForModule(m);
    if (!childKeys.length) return;

    let newSections = [...selected];
    if (nowSelected) {
      // Deselecting module — remove all its child sections
      newSections = newSections.filter(k => !childKeys.includes(k));
    } else {
      // Selecting module — add all its child sections (avoid duplicates)
      childKeys.forEach(k => { if (!newSections.includes(k)) newSections.push(k); });
    }
    sn("agendaSections")(newSections);
  };
  const dayAssign   = notes.dayAssign || {};
  const getDay      = key => dayAssign[key] || 1;
  const setDay      = (key, d) => sn("dayAssign")({ ...dayAssign, [key]: d });

  const buildDayBlocks = dayNum => {
    const result = [];
    CLIENT_AGENDA.forEach((agenda, di) => {
      const secs = agenda.sections.filter((_, si) => {
        const key = `d${di}s${si}`;
        return isSelected(key) && (trainingDays === 1 || getDay(key) === dayNum);
      });
      if (secs.length) result.push({ ...agenda, sections: secs });
    });
    return result;
  };

  // Date/time helpers
  const fmtDisplayDate = dateStr => {
    if (!dateStr) return "";
    const d = new Date(dateStr + "T00:00:00");
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
  };
  const fmtTime12 = t => {
    if (!t) return "";
    const [hh, mm] = t.split(":");
    const h = parseInt(hh); const ampm = h >= 12 ? "pm" : "am";
    return `${h > 12 ? h - 12 : h || 12}:${mm}${ampm}`;
  };

  const Tick = ({ checked }) => (
    <div style={{ width: 14, height: 14, borderRadius: 2, flexShrink: 0,
      background: checked ? C.blue : "#fff", border: `1.5px solid ${checked ? C.blue : C.border}`,
      display: "flex", alignItems: "center", justifyContent: "center" }}>
      {checked && <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5L8 1" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
    </div>
  );

  const DayToggle = ({ sectionKey }) => {
    const d = getDay(sectionKey);
    return (
      <div style={{ display: "flex", borderRadius: 3, overflow: "hidden", border: `1px solid ${C.border}`, flexShrink: 0, marginLeft: 6 }}>
        {Array.from({ length: trainingDays }, (_, i) => i + 1).map(num => (
          <button key={num} onClick={e => { e.stopPropagation(); setDay(sectionKey, num); }}
            style={{ padding: "2px 7px", fontSize: 10, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
              background: d === num ? C.blue : "#fff", color: d === num ? "#fff" : C.dark30,
              border: "none", borderRight: num < trainingDays ? `1px solid ${C.border}` : "none" }}>
            D{num}
          </button>
        ))}
      </div>
    );
  };

  const objectives = buildClientObjectives(h(row, "areas"), h(row, "priorities"));

  // Info panel data
  const infoPanelSections = [
    {
      title: "Contact Details", icon: "👤", color: C.blue,
      items: [
        { label: "Stakeholder", value: h(row, "stakeholder") },
        { label: "Email", value: h(row, "email") },
        { label: "Attendees", value: h(row, "attendees") },
      ]
    },
    {
      title: "Training Details", icon: "📚", color: "#7c3aed",
      items: [
        { label: "Assigned Trainer", value: h(row, "trainer") },
        { label: "Status", value: h(row, "status") },
        { label: "Training Type", value: h(row, "trainingType") },
        { label: "Areas", value: h(row, "areas") },
        { label: "Familiarity", value: h(row, "familiar") },
        { label: "Priorities", value: h(row, "priorities") },
        { label: "Target Go-Live", value: h(row, "goLive") },
      ]
    },
    {
      title: "Financials", icon: "💰", color: C.greenDark,
      items: [
        { label: "Invoice Value", value: h(row, "invoice") && h(row, "invoice") !== "—" ? `£${h(row, "invoice")}` : "—" },
        { label: "Score", value: h(row, "score") },
        { label: "Booked On", value: fmtTrainingDate(h(row, "booked")) },
      ]
    },
    {
      title: "Referral", icon: "🔗", color: C.amberDark,
      items: [
        { label: "Referred By", value: h(row, "referred") },
        { label: "Notes", value: h(row, "col1") },
      ]
    },
    {
      title: "Logistics", icon: "📍", color: C.redDark,
      items: [
        { label: "Location", value: h(row, "location") },
        { label: "Parking / Venue", value: h(row, "parking") },
        { label: "Venue Setup", value: h(row, "venueSetup") },
        { label: "Specific Features", value: h(row, "features") },
        { label: "Post-Training", value: h(row, "followUp") },
        { label: "Additional Info", value: h(row, "anything") },
      ]
    },
  ];

  return (
    <div style={{ display: "flex", gap: 20, alignItems: "flex-start" }}>

      {/* Main Document Column */}
      <div style={{ flex: 1, minWidth: 0 }}>

        {/* Agenda Builder Controls (screen only) */}
        <div className="no-print" style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 18px", marginBottom: 20, boxShadow: "0 1px 4px rgba(18,21,42,0.06)" }}>

          {/* Training Days */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Number of Training Days</div>
            <div style={{ display: "flex", borderRadius: 4, overflow: "hidden", border: `1px solid ${C.border}`, width: "fit-content" }}>
              {[1, 2, 3, 4, 5].map(d => (
                <button key={d} onClick={() => sn("trainingDays")(d)} style={{
                  padding: "7px 18px", fontSize: 12, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                  background: trainingDays === d ? C.blue : "#fff",
                  color: trainingDays === d ? "#fff" : C.dark40,
                  border: "none", borderRight: d < 5 ? `1px solid ${C.border}` : "none",
                  transition: "all 0.1s"
                }}>{d} Day{d > 1 ? "s" : ""}</button>
              ))}
            </div>
          </div>

          {/* Per-day date & time pickers */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 16 }}>
            {Array.from({ length: trainingDays }, (_, i) => (
              <div key={i} style={{ background: C.grey, border: `1px solid ${C.border}`, borderRadius: 8, padding: "10px 12px", minWidth: 0, width: "calc(20% - 7px)", flexShrink: 0, flexGrow: 0, boxSizing: "border-box" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.blue, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                  <div style={{ width: 18, height: 18, borderRadius: "50%", background: C.blue, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 900, flexShrink: 0, boxShadow: "0 1px 4px rgba(91,75,231,0.3)" }}>{i + 1}</div>
                  Day {i + 1}
                </div>
                <div style={{ marginBottom: 6 }}>
                  <div style={{ fontSize: 9, color: C.dark30, fontWeight: 600, marginBottom: 3, textTransform: "uppercase" }}>Date</div>
                  <input type="date" value={dayDates[i] || ""} onChange={e => setDayDate(i, e.target.value)}
                    style={{ width: "100%", border: `1px solid ${C.border}`, borderRadius: 3, padding: "5px 6px", fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: C.dark, outline: "none" }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5 }}>
                  {[["Start", "start", "10:30"], ["End", "end", "16:30"]].map(([label, field, def]) => (
                    <div key={field}>
                      <div style={{ fontSize: 9, color: C.dark30, fontWeight: 600, marginBottom: 3, textTransform: "uppercase" }}>{label}</div>
                      <input type="time" value={(dayTimes[i] || {})[field] || def}
                        onChange={e => setDayTime(i, field, e.target.value)}
                        style={{ width: "100%", border: `1px solid ${C.border}`, borderRadius: 3, padding: "5px 4px", fontFamily: "'DM Sans', sans-serif", fontSize: 11, color: C.dark, outline: "none" }} />
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* Modules — clicking toggles all child sections automatically */}
          <div style={{ marginBottom: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.06em" }}>Topics & Modules</div>
              <span style={{ fontSize: 10, color: C.dark20, fontStyle: "italic" }}>Selecting/deselecting a module auto-selects its agenda sections</span>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
              {MODULES.map(m => {
                const chk = selectedModules.includes(m);
                const childKeys = sectionKeysForModule(m);
                const selectedChildCount = childKeys.filter(k => selected.includes(k)).length;
                const totalChildCount = childKeys.length;
                // Partially selected = module on but some child sections manually unticked
                const partial = chk && selectedChildCount < totalChildCount && selectedChildCount > 0;
                return (
                  <div key={m} onClick={() => toggleModule(m)} style={{
                    display: "flex", alignItems: "center", gap: 7, padding: "6px 12px", borderRadius: 6, cursor: "pointer",
                    background: chk ? C.blueLight : C.grey,
                    border: `1.5px solid ${partial ? C.blue : chk ? C.blueBorder : C.border}`,
                    transition: "all 0.1s",
                    boxShadow: chk ? "0 1px 4px rgba(91,75,231,0.10)" : "none",
                  }}>
                    <Tick checked={chk} />
                    <span style={{ fontSize: 12, color: chk ? C.blue : C.dark40, fontWeight: chk ? 700 : 400 }}>{m}</span>
                    {totalChildCount > 0 && (
                      <span style={{
                        fontSize: 10, fontWeight: 700, borderRadius: 10, padding: "1px 6px",
                        background: chk ? C.blue : C.dark10,
                        color: chk ? "#fff" : C.dark30,
                        marginLeft: 2,
                      }}>{selectedChildCount}/{totalChildCount}</span>
                    )}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Agenda section toggles — grouped under their module */}
          <div>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.06em" }}>Agenda Sections</div>
              <button onClick={toggleAll} style={{ fontSize: 11, color: C.blue, background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderRadius: 6, padding: "4px 12px", cursor: "pointer", fontFamily: "'DM Sans', sans-serif", fontWeight: 600 }}>
                {selected.length === ALL_SECTIONS.length ? "Deselect all" : "Select all"}
              </button>
            </div>
            {CLIENT_AGENDA.map((agenda, di) => {
              const moduleSelected = selectedModules.includes(agenda.title);
              return (
                <div key={di} style={{ marginBottom: 10, opacity: moduleSelected ? 1 : 0.45, transition: "opacity 0.15s" }}>
                  {/* Module group header — clickable shortcut to toggle the whole module */}
                  <div
                    onClick={() => toggleModule(agenda.title)}
                    style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 5, cursor: "pointer", userSelect: "none" }}
                  >
                    <div style={{ width: 8, height: 8, borderRadius: 2, flexShrink: 0,
                      background: moduleSelected ? C.blue : C.dark10,
                      border: `1.5px solid ${moduleSelected ? C.blue : C.border}`,
                      display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {moduleSelected && <svg width="5" height="4" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5L8 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </div>
                    <span style={{ fontSize: 10, fontWeight: 700, color: moduleSelected ? C.blue : C.dark20, textTransform: "uppercase", letterSpacing: "0.08em" }}>{agenda.title}</span>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 5, paddingLeft: 14 }}>
                    {agenda.sections.map((sec, si) => {
                      const key = `d${di}s${si}`; const chk = isSelected(key);
                      return (
                        <div key={key} onClick={() => toggle(key)} style={{
                          display: "flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 6, cursor: "pointer",
                          background: chk ? C.blueLight : C.grey,
                          border: `1px solid ${chk ? C.blueBorder : C.border}`,
                        }}>
                          <Tick checked={chk} />
                          <span style={{ fontSize: 11, color: chk ? C.blue : C.dark40, fontWeight: chk ? 600 : 400 }}>{sec.heading}</span>
                          {chk && trainingDays > 1 && <DayToggle sectionKey={key} />}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
            {/* Ops section lives under Settings & Core Platform */}
            <div style={{ paddingLeft: 14, marginTop: -4 }}>
              <div onClick={() => toggle("ops")} style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 10px", borderRadius: 6, cursor: "pointer",
                background: isSelected("ops") ? C.blueLight : C.grey, border: `1px solid ${isSelected("ops") ? C.blueBorder : C.border}` }}>
                <Tick checked={isSelected("ops")} />
                <span style={{ fontSize: 11, color: isSelected("ops") ? C.blue : C.dark40, fontWeight: isSelected("ops") ? 600 : 400 }}>Operational Settings Review</span>
                {isSelected("ops") && trainingDays > 1 && <DayToggle sectionKey="ops" />}
              </div>
            </div>
          </div>
        </div>

        {/* DOCUMENT */}
        <div style={{ fontFamily: "'DM Sans', sans-serif", color: C.dark, fontSize: 14, lineHeight: "20px" }}>

          {/* Header */}
          <div style={{ marginBottom: 24 }}>

            </div>
            <h1 style={{ fontSize: 28, fontWeight: 700, margin: "0 0 4px", color: C.dark, lineHeight: 1.2 }}>
              {h(row, "company")} x Street Group
            </h1>
            <div style={{ fontSize: 14, color: C.dark30 }}>Meeting Agenda</div>
          </div>

          {/* Agenda Info Table */}
          <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: "hidden", marginBottom: 24, boxShadow: "0 1px 4px rgba(18,21,42,0.06)" }}>

            {/* Date(s) of training */}
            <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", borderBottom: `1px solid #ddd` }}>
              <div style={{ padding: "12px 14px", background: "#f8f8f8", borderRight: `1px solid #ddd`, display: "flex", alignItems: "flex-start", gap: 8 }}>
                <span>📅</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.dark }}>Date(s) of training</span>
              </div>
              <div style={{ padding: "12px 14px" }}>
                {Array.from({ length: trainingDays }, (_, i) => (
                  <div key={i} style={{ marginBottom: i < trainingDays - 1 ? 7 : 0, fontSize: 13, color: C.dark, display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap" }}>
                    {trainingDays > 1 && (
                      <span style={{ fontWeight: 700, color: C.blue, fontSize: 10, textTransform: "uppercase", letterSpacing: "0.06em", minWidth: 40 }}>Day {i + 1}</span>
                    )}
                    {dayDates[i] ? (
                      <>
                        <span style={{ fontWeight: 600 }}>{fmtDisplayDate(dayDates[i])}</span>
                        {((dayTimes[i] || {}).start || (dayTimes[i] || {}).end) && (
                          <span style={{ color: C.dark40, fontSize: 12 }}>
                            {fmtTime12((dayTimes[i] || {}).start || "10:30")} – {fmtTime12((dayTimes[i] || {}).end || "16:30")}
                          </span>
                        )}
                      </>
                    ) : (
                      <span style={{ color: C.dark20, fontStyle: "italic" }}>[Session Date]</span>
                    )}
                  </div>
                ))}
              </div>
            </div>

            {/* Logistics & Technical Setup */}
            <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", borderBottom: `1px solid #ddd` }}>
              <div style={{ padding: "12px 14px", background: "#f8f8f8", borderRight: `1px solid #ddd`, display: "flex", alignItems: "flex-start", gap: 8 }}>
                <span>📍</span>
                <span style={{ fontSize: 13, fontWeight: 700, color: C.dark }}>Logistics & Technical Setup</span>
              </div>
              <div style={{ padding: "12px 14px" }}>
                {h(row, "location") !== "—" && <div style={{ marginBottom: 4, fontSize: 13 }}><strong>Location:</strong> {h(row, "location")}</div>}
                {h(row, "parking") !== "—" && <div style={{ marginBottom: 4, fontSize: 13 }}><strong>Parking / Info:</strong> {h(row, "parking")}</div>}
                {h(row, "venueSetup") !== "—" && <div style={{ marginBottom: 8, fontSize: 13 }}><strong>Venue Setup:</strong> {h(row, "venueSetup")}</div>}
                <div style={{ color: C.dark40, fontSize: 12, marginBottom: 8 }}>Equipment checklist (projector, screen, Wi-Fi, HDMI, extension leads, etc.) · Timing for breaks and wrap-up</div>
                <textarea className="notes-screen-only" value={n("logisticsNotes")} onChange={e => sn("logisticsNotes")(e.target.value)}
                  placeholder="Additional logistics notes…"
                  style={{ width: "100%", minHeight: 44, padding: "6px 10px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: C.yellowBg, border: `1px dashed ${C.yellow}`, borderRadius: 3, resize: "vertical", outline: "none" }} />
                <div className="notes-print-only" style={{ fontSize: 13, color: C.dark, whiteSpace: "pre-wrap" }}>{n("logisticsNotes")}</div>
              </div>
            </div>

            {/* Client / Stakeholder / Attendees */}
            <div style={{ display: "grid", gridTemplateColumns: "200px 1fr", borderBottom: `1px solid #ddd` }}>
              <div style={{ padding: "12px 14px", background: "#f8f8f8", borderRight: `1px solid #ddd` }}>
                <span style={{ fontSize: 14 }}>📍</span>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.dark, marginTop: 2, marginBottom: 4 }}>Client / Company</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.dark40, marginBottom: 4 }}>Stakeholder (Authorising Training)</div>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.dark40 }}>Attendees / roles</div>
              </div>
              <div style={{ padding: "12px 14px" }}>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, color: C.dark30, fontWeight: 600, textTransform: "uppercase", marginBottom: 2 }}>Client / Company</div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.dark }}>{h(row, "company")}</div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, color: C.dark30, fontWeight: 600, textTransform: "uppercase", marginBottom: 2 }}>Stakeholder (Authorising Training)</div>
                  <div style={{ fontSize: 13, color: C.dark }}>{h(row, "stakeholder")}</div>
                </div>
                <div style={{ marginBottom: 10 }}>
                  <div style={{ fontSize: 10, color: C.dark30, fontWeight: 600, textTransform: "uppercase", marginBottom: 6 }}>Attendees & Roles</div>
                  <div className="no-print">
                    {attendeesList.map((att, i) => (
                      <div key={i} style={{ display: "flex", gap: 6, marginBottom: 6, alignItems: "center" }}>
                        <span style={{ color: C.blue, fontSize: 12, flexShrink: 0 }}>•</span>
                        <input type="text" value={att.name} onChange={e => updateAttendee(i, "name", e.target.value)} placeholder="Attendee name"
                          style={{ flex: 1, border: "none", borderBottom: `1px dashed ${C.yellow}`, padding: "3px 4px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: "transparent", outline: "none" }} />
                        <span style={{ color: C.dark20 }}>—</span>
                        <input type="text" value={att.role} onChange={e => updateAttendee(i, "role", e.target.value)} placeholder="Role / Job Title"
                          style={{ flex: 1, border: "none", borderBottom: `1px dashed ${C.yellow}`, padding: "3px 4px", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: "transparent", outline: "none" }} />
                        <button onClick={() => removeAttendee(i)} style={{ background: "none", border: "none", cursor: "pointer", color: C.dark20, fontSize: 15, padding: "0 2px", flexShrink: 0 }}>×</button>
                      </div>
                    ))}
                    <button onClick={addAttendee} style={{ background: "none", border: `1px dashed ${C.border}`, borderRadius: 3, padding: "3px 10px", fontSize: 11, color: C.dark30, cursor: "pointer", marginTop: 2 }}>+ Add attendee</button>
                    <div style={{ marginTop: 8 }}>
                      <input type="text" value={n("earlyLeaveNotes")} onChange={e => sn("earlyLeaveNotes")(e.target.value)}
                        placeholder="(Include notes on if/when anyone needs to leave early)"
                        style={{ width: "100%", border: "none", borderBottom: `1px dashed ${C.yellow}`, padding: "3px 4px", fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: C.dark40, fontStyle: "italic", background: "transparent", outline: "none" }} />
                    </div>
                  </div>
                  <div className="notes-print-only">
                    {attendeesList.filter(a => a.name).map((att, i) => (
                      <div key={i} style={{ display: "flex", gap: 8, marginBottom: 4, fontSize: 13 }}>
                        <span style={{ color: C.blue }}>•</span>
                        <span>{att.name}{att.role ? ` — ${att.role}` : ""}</span>
                      </div>
                    ))}
                    {n("earlyLeaveNotes") && <div style={{ fontSize: 12, color: C.dark40, fontStyle: "italic", marginTop: 4 }}>{n("earlyLeaveNotes")}</div>}
                  </div>
                </div>
                <div>
                  <div style={{ fontSize: 10, color: C.dark30, fontWeight: 600, textTransform: "uppercase", marginBottom: 4 }}>Dietary Requirements</div>
                  <input type="text" value={n("dietary")} onChange={e => sn("dietary")(e.target.value)} placeholder="Any dietary requirements…"
                    className="notes-screen-only"
                    style={{ width: "100%", border: "none", borderBottom: `1px dashed ${C.yellow}`, padding: "4px 0", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: "transparent", outline: "none" }} />
                  <div className="notes-print-only" style={{ fontSize: 13, color: C.dark }}>{n("dietary") || "None noted"}</div>
                </div>
              </div>
            </div>

            {/* Topics & Modules */}
            <div style={{ display: "grid", gridTemplateColumns: "200px 1fr" }}>
              <div style={{ padding: "12px 14px", background: "#f8f8f8", borderRight: `1px solid #ddd` }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.dark, marginBottom: 3 }}>Topics & Modules to Cover</div>
                <div style={{ fontSize: 11, color: C.dark30 }}>As selected by the client</div>
              </div>
              <div style={{ padding: "12px 14px" }}>
                {MODULES.map(m => {
                  const checked = selectedModules.includes(m);
                  return (
                    <div key={m} onClick={() => toggleModule(m)} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7, cursor: "pointer" }}>
                      <div style={{ width: 14, height: 14, border: `1.5px solid ${checked ? C.blue : "#bbb"}`, borderRadius: 2, flexShrink: 0,
                        background: checked ? C.blue : "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {checked && <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5L8 1" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                      <span style={{ fontSize: 13, color: checked ? C.dark : C.dark30 }}>{m}</span>
                    </div>
                  );
                })}
                <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ fontSize: 12, color: C.dark30, flexShrink: 0 }}>Other areas:</span>
                  <input type="text" value={n("otherAreas")} onChange={e => sn("otherAreas")(e.target.value)}
                    placeholder="Specifically requested features/workflows or challenges"
                    className="notes-screen-only"
                    style={{ flex: 1, border: "none", borderBottom: `1px dashed ${C.yellow}`, padding: "2px 4px", fontFamily: "'DM Sans', sans-serif", fontSize: 12, color: C.dark, background: "transparent", outline: "none" }} />
                  <span className="notes-print-only" style={{ fontSize: 12, color: C.dark }}>{n("otherAreas") || "—"}</span>
                </div>
              </div>
            </div>


          </div>

          {/* Topics Covered */}
          <div style={{ marginBottom: 24 }}>
            <h2 style={{ fontSize: 20, fontWeight: 700, marginBottom: 16, paddingBottom: 8, borderBottom: `2px solid ${C.dark}` }}>Topics covered</h2>

            <div style={{ marginBottom: 14 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, fontStyle: "italic", color: C.dark40, marginBottom: 8 }}>Welcome & Introduction</h3>
              {["Brief round of introductions", "Overview of session purpose and structure"].map((item, i) => (
                <div key={i} style={{ display: "flex", gap: 8, marginBottom: 5, fontSize: 13, color: C.dark, paddingLeft: 12 }}>
                  <span style={{ color: C.blue }}>•</span><span>{item}</span>
                </div>
              ))}
            </div>

            <div style={{ marginBottom: 14 }}>
              <h3 style={{ fontSize: 13, fontWeight: 700, fontStyle: "italic", color: C.dark40, marginBottom: 8 }}>Training Context & Goals</h3>
              <div style={{ display: "flex", gap: 8, marginBottom: 6, fontSize: 13, color: C.dark, paddingLeft: 12 }}>
                <span style={{ color: C.blue, flexShrink: 0 }}>•</span>
                <span>Familiarity with Street.co.uk: <strong>{h(row, "familiar")}</strong></span>
              </div>
              <div style={{ display: "flex", gap: 8, fontSize: 13, color: C.dark, paddingLeft: 12 }}>
                <span style={{ color: C.blue, flexShrink: 0, marginTop: 1 }}>•</span>
                <div>
                  <div style={{ marginBottom: 6 }}>Review of top objectives for the training:</div>
                  {objectives.slice(0, 3).map((obj, i) => (
                    <div key={i} style={{ display: "flex", gap: 8, marginBottom: 4, paddingLeft: 10, fontSize: 13, color: C.dark40 }}>
                      <span style={{ flexShrink: 0 }}>{i + 1}.</span><span>{obj}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>

              return (
                <div key={opt} onClick={() => {
                  const cur = notes.followupOptions || [];
                  sn("followupOptions")(checked ? cur.filter(x => x !== opt) : [...cur, opt]);
                }} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, cursor: "pointer" }}>
                  <div style={{ width: 14, height: 14, border: `1.5px solid ${checked ? C.blue : "#bbb"}`, borderRadius: 2, flexShrink: 0,

          </div>

          {/* Footer */}
          <div style={{ paddingTop: 16, borderTop: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between" }}>

      {/* Right Info Panel (screen only) */}

  );
}


// ─── POST-TRAINING SUMMARY PACK (CLIENT) ──────────────────────────────────
function PostTrainingClientView({ row, agendaBlocks, agendaLoading, notes, setNotes }) {
  const n = (k, def) => notes[k] !== undefined ? notes[k] : (def !== undefined ? def : "");
  const sn = k => v => setNotes(p => ({ ...p, [k]: v }));

  const preConf = n("preConfidence", 0);
  const postConf = n("postConfidence", 0);
  const delta = preConf && postConf ? postConf - preConf : null;

  const qaRows = n("qa", [{ area: "", q: "", a: "", followUp: false }]);
  const addQA = () => sn("qa")([...qaRows, { area: "", q: "", a: "", followUp: false }]);
  const updateQA = (i, field, val) => { const r = [...qaRows]; r[i] = { ...r[i], [field]: val }; sn("qa")(r); };
  const removeQA = (i) => sn("qa")(qaRows.filter((_, j) => j !== i));

  const [helpActive, setHelpActive] = useState(["Sales", "Lettings", "Property Management", "Accounting"]);
  const [helpSelected, setHelpSelected] = useState(n("helpSelected", []));
  const toggleCat = (cat) => setHelpActive(p => p.includes(cat) ? p.filter(c => c !== cat) : [...p, cat]);
  const toggleItem = (key) => { const next = helpSelected.includes(key) ? helpSelected.filter(k => k !== key) : [...helpSelected, key]; setHelpSelected(next); sn("helpSelected")(next); };
  const selectedLinks = helpSelected.map(key => { const [cat, idx] = key.split("-"); return HELP_CENTRE_BANK[cat]?.[parseInt(idx)]; }).filter(Boolean);

  const confColor = (v) => v <= 4 ? C.redDark : v <= 6 ? C.amberDark : C.greenDark;
  const confBg = (v) => v <= 4 ? "#ef5350" : v <= 6 ? "#ff9800" : "#4caf50";

  const BulletList = ({ text }) => {
    if (!text || text === "—") return null;
    return <div>{text.split(/\n/).map(s => s.trim()).filter(Boolean).map((item, i) => (
      <div key={i} style={{ display: "flex", gap: 10, marginBottom: 6, alignItems: "flex-start" }}>
        <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.blue, marginTop: 7, flexShrink: 0 }} />
        <span style={{ fontSize: 14, color: C.dark, lineHeight: "20px" }}>{item}</span>
      </div>
    ))}</div>;
  };

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", color: C.dark, fontSize: 14, lineHeight: "20px" }}>
      {/* Doc header */}
      <div style={{ marginBottom: 28, paddingBottom: 20, borderBottom: `3px solid ${C.blue}`, paddingTop: 0 }}>
        <div style={{ fontSize: 10, color: C.blue, letterSpacing: "0.15em", textTransform: "uppercase", fontWeight: 700, marginBottom: 8 }}>STREET PRODUCT TRAINING</div>
        <div style={{ fontSize: 11, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10 }}>Post-Training Summary Pack</div>
        <h1 style={{ margin: "0 0 16px", fontSize: 28, fontWeight: 700, lineHeight: 1.1 }}>{h(row, "company")}</h1>
        <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
          {[["Training Date", fmtTrainingDate(h(row, "date"))], ["Trainer", h(row, "trainer")], ["Attendees", h(row, "attendees")]].map(([l, v]) => (
            <div key={l}><div style={{ fontSize: 10, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 3 }}>{l}</div><div style={{ fontSize: 13, fontWeight: 600, maxWidth: 300 }}>{v}</div></div>
          ))}
        </div>
      </div>

      {/* Confidence Delta */}
      <Section num={null} title="Confidence Score">
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
          <div style={{ background: C.grey, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px" }}>
            <ConfidenceBar label="Pre-Session Confidence" value={preConf} onChange={v => sn("preConfidence")(v)} color="#ff9800" />
          </div>
          <div style={{ background: C.grey, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px" }}>
            <ConfidenceBar label="Post-Session Confidence" value={postConf} onChange={v => sn("postConfidence")(v)} color="#4caf50" />
          </div>
        </div>
        {delta !== null && (
          <div style={{
            background: delta >= 0 ? C.greenBg : C.red, border: `1px solid ${delta >= 0 ? "#7bc97a" : "#f9b4bc"}`,
            borderRadius: 4, padding: "10px 16px", display: "flex", alignItems: "center", gap: 14
          }}>
            <div style={{ fontSize: 28, fontWeight: 900, color: delta >= 0 ? C.greenDark : C.redDark }}>
              {delta >= 0 ? "+" : ""}{delta}
            </div>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: delta >= 0 ? C.greenDark : C.redDark, textTransform: "uppercase", letterSpacing: "0.06em" }}>Confidence Delta</div>
              <div style={{ fontSize: 12, color: delta >= 0 ? C.greenDark : C.redDark }}>
                {delta >= 3 ? "Strong uplift — excellent session outcome" : delta >= 1 ? "Positive progress — good session" : delta === 0 ? "No change — consider follow-up session" : "Score dropped — review session notes"}
              </div>
            </div>
          </div>
        )}
      </Section>

      <Section num="1" title="Session Overview">
        <p style={{ fontSize: 14, color: C.dark, marginBottom: 12 }}>Thank you for your time during your Street training session. The session focused on:</p>
        <div style={{ background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderLeft: `3px solid ${C.blue}`, borderRadius: "0 8px 8px 0", padding: "12px 16px", marginBottom: 12 }}>
          <div style={{ fontSize: 13, color: C.dark40 }}>{h(row, "areas")}</div>
        </div>
        <p style={{ fontSize: 14, color: C.dark40, marginBottom: 8 }}>With particular attention to:</p>
        <BulletList text={h(row, "priorities")} />
        <NotesBlock label="Session Overview Notes" placeholder="Additional overview context…" value={n("overviewNotes")} onChange={sn("overviewNotes")} minHeight={52} />
      </Section>

      <Section num="2" title="What We Covered">
        <p style={{ fontSize: 12, color: C.dark30, marginBottom: 14, fontStyle: "italic" }}>Customise before sending — fill in what was actually covered.</p>
        {[["Settings & Core Platform", "covered_settings"], ["Sales", "covered_sales"], ["Lettings", "covered_lettings"], ["Property Management", "covered_pm"], ["Accounting & Invoicing", "covered_accounting"]].map(([label, k]) => (
          <div key={k} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.dark40, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8, paddingBottom: 6, borderBottom: `1px solid ${C.border}` }}>{label}</div>
            <EditableBulletList items={n(k, [""])} onChange={sn(k)} placeholder="Add topic covered…" />

        ))}

      <Section num="3" title="Key Workflow Improvements Identified">

      <Section num="4" title="Questions Raised & Clarifications Provided">

          {qaRows.map((row_, i) => (

                  <option value="">Area…</option>
                  {["Settings & Core Platform", "Sales", "Lettings", "Property Management", "Accounting", "Integrations", "General"].map(o => <option key={o} value={o}>{o}</option>)}

              </div>
              <div style={{ borderRight: `1px solid ${C.border}`, padding: "6px 8px" }}>
                <input type="text" value={row_.q} onChange={e => updateQA(i, "q", e.target.value)} placeholder="Question raised…"
                  style={{ width: "100%", border: "none", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: "transparent", outline: "none" }} />
              </div>
              <div style={{ borderRight: `1px solid ${C.border}`, padding: "6px 8px" }}>
                <input type="text" value={row_.a} onChange={e => updateQA(i, "a", e.target.value)} placeholder="Outcome…"
                  style={{ width: "100%", border: "none", fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark, background: "transparent", outline: "none" }} />
              </div>
              <div style={{ padding: "6px 8px", display: "flex", alignItems: "center", gap: 6 }}>
                <input type="checkbox" checked={row_.followUp || false} onChange={e => updateQA(i, "followUp", e.target.checked)}
                  style={{ accentColor: C.blue, width: 14, height: 14, cursor: "pointer" }} />
                <span style={{ fontSize: 11, color: row_.followUp ? C.redDark : C.dark30 }}>{row_.followUp ? "Yes" : "No"}</span>
                <button className="no-print" onClick={() => removeQA(i)} style={{ marginLeft: "auto", background: "none", border: "none", cursor: "pointer", color: C.dark20, fontSize: 13 }}>×</button>
              </div>
            </div>
          ))}
        </div>
        <button className="no-print" onClick={addQA} style={{ background: "none", border: `1px dashed ${C.border}`, borderRadius: 6, padding: "5px 12px", fontSize: 11, color: C.dark30, cursor: "pointer", marginTop: 6 }}>+ Add Q&A row</button>

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>

              <div style={{ fontSize: 12, fontWeight: 700, color: C.dark40, textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 10, paddingBottom: 6, borderBottom: `1px solid ${C.border}` }}>{label}</div>
              <EditableBulletList items={n(k, [""])} onChange={sn(k)} placeholder="Add action…" />

                    </div>

                  </div>

        {selectedLinks.length > 0 && (
          <div style={{ marginBottom: 10 }}>
            {selectedLinks.map((link, i) => (
              <div key={i} style={{ display: "flex", gap: 8, marginBottom: 6 }}>
                <div style={{ width: 5, height: 5, borderRadius: "50%", background: C.blue, marginTop: 7, flexShrink: 0 }} />

        <NotesBlock label="Additional Resources" placeholder="Recording links, template resources, custom URLs…" value={n("resources")} onChange={sn("resources")} minHeight={52} />

      <Section num="7" title="Next Steps & Ongoing Support">
        <div style={{ background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderLeft: `3px solid ${C.blue}`, borderRadius: "0 4px 4px 0", padding: "14px 18px", marginBottom: 14 }}>
          <div style={{ fontSize: 12, color: C.dark30, marginBottom: 6, fontWeight: 600 }}>As requested by {h(row, "company")}:</div>
          <div style={{ fontSize: 14, color: C.dark }}>{h(row, "followUp")}</div>
        </div>

// ─── SAVE DEBRIEF TO SHEET ────────────────────────────────────────────────
async function saveDebriefToSheet(row, notes, allNotes, selected) {
  if (!DEBRIEF_SHEET_URL || DEBRIEF_SHEET_URL === "YOUR_APPS_SCRIPT_EXEC_URL_HERE") {
    throw new Error("DEBRIEF_SHEET_URL is not configured. See apps-script.gs setup instructions.");
  }

  const prepHours     = parseFloat(notes.prepHours     || "") || 0;
  const deliveryHours = parseFloat(notes.deliveryHours || "") || 0;
  const followUpHours = parseFloat(notes.followUpHours || "") || 0;
  const totalHours    = prepHours + deliveryHours + followUpHours;
  const invoiceVal    = parseFloat((h(row, "invoice") || "").replace(/[^0-9.]/g, "")) || 0;
  const revenuePerHour = totalHours > 0 && invoiceVal > 0
    ? (invoiceVal / totalHours).toFixed(2) : "";
  const preConf  = notes.preConfidence  || 0;
  const postConf = notes.postConfidence || 0;
  const delta    = preConf && postConf ? postConf - preConf : "";
  const theme    = deriveTheme(h(row, "areas"));
  const riskLevel = getRiskLevel(notes);

  const payload = {
    action:              "saveDebrief",
    company:             h(row, "company"),
    trainer:             h(row, "trainer"),
    trainingDate:        fmtTrainingDate(h(row, "date")),
    invoiceValue:        h(row, "invoice"),
    theme,
    deliveryType:        notes.session_delivery_type || "",
    repeatClient:        notes.repeat_client_        || "",
    prevSessionDate:     notes.prevSessionDate       || "",
    preConfidence:       preConf  || "",
    postConfidence:      postConf || "",
    confidenceDelta:     delta !== "" ? (delta >= 0 ? `+${delta}` : String(delta)) : "",
    complexity:          notes.complexity            || "",
    adoptionRisk:        notes.adoption_risk         || "",
    upsellOpportunity:   notes.upsell_opportunity    || "",
    escalation:          notes.escalation_required_  || "",
    systemMisuse:        notes.system_misuse         || "",
    accountingReadiness: notes.accounting_readiness  || "",
    sessionEnergy:       notes.session_energy        || "",
    objectivesMet:       notes.objectives_met        || "",
    prepHours:           prepHours     || "",
    deliveryHours:       deliveryHours || "",
    followUpHours:       followUpHours || "",
    totalHours:          totalHours    || "",
    revenuePerHour,
    riskLevel:           riskLevel.toUpperCase(),
    commercialNotes:     notes.commercialNotes  || "",
    wentWell:            notes.wentWell         || "",
    improved:            notes.improved         || "",
    internalActions:     notes.internalActions  || "",
    handoff:             notes.handoff          || "",
    riskNotes:           notes.riskNotes        || "",
    debriefGeneral:      notes.debriefGeneral   || "",
    timeNotes:           notes.timeNotes        || "",
    // ── Trainer Prep notes ──────────────────────────────────────────────────
    trainerStakeholderNotes: (allNotes[`${selected}-trainer`] || {}).stakeholder    || "",
    trainerRiskNotes:        (allNotes[`${selected}-trainer`] || {}).risk           || "",
    trainerPrepNotes:        (allNotes[`${selected}-trainer`] || {}).prep           || "",
    trainerAgendaNotes:      (allNotes[`${selected}-trainer`] || {}).agendaExtra    || "",
    trainerLogisticsNotes:   (allNotes[`${selected}-trainer`] || {}).logistics      || "",
    trainerFollowUpNotes:    (allNotes[`${selected}-trainer`] || {}).followup       || "",
    trainerGeneralNotes:     (allNotes[`${selected}-trainer`] || {}).general        || "",
    // ── Client Doc notes ────────────────────────────────────────────────────
    clientAttendeeNotes:     (allNotes[`${selected}-client`] || {}).attendees       || "",
    clientSessionNotes:      (allNotes[`${selected}-client`] || {}).session         || "",
    clientSupportNotes:      (allNotes[`${selected}-client`] || {}).support         || "",
    clientLogisticsNotes:    (allNotes[`${selected}-client`] || {}).logistics       || "",
    clientGeneralNotes:      (allNotes[`${selected}-client`] || {}).clientGeneral   || "",
    // ── Summary Pack notes ──────────────────────────────────────────────────
    summaryOverviewNotes:    (allNotes[`${selected}-post`] || {}).overviewNotes     || "",
    summaryResourceNotes:    (allNotes[`${selected}-post`] || {}).resources         || "",
    summaryNextStepsNotes:   (allNotes[`${selected}-post`] || {}).nextSteps         || "",
  };

  const url = DEBRIEF_SHEET_URL + "?" + new URLSearchParams(payload).toString();
  const res = await fetch(url, { method: "GET", redirect: "follow" });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || "Unknown error from Apps Script");
  return json;
}
