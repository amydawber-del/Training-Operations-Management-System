    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --purple: #5B4BE7;
      --purple-light: #F0EFFE;
      --purple-border: #C9C4F8;
      --navy: #12152A;
      --dark: #1C1F3A;
      --mid: #4A4E72;
      --muted: #8E93BB;
      --soft: #C5C8E0;
      --bg: #F6F7FB;
      --white: #FFFFFF;
      --border: #E4E6F2;
      --green: #1B6B42;
      --green-bg: #EDFAF4;
      --amber: #9A5000;
      --amber-bg: #FFF3E0;
      --font-display: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--dark);
      font-size: 15px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; }
    input, textarea, select, button { font-family: var(--font-body); }
    ::placeholder { color: var(--soft); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--purple-border); border-radius: 8px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .anim-fade-up { animation: fadeUp 0.4s ease both; }
    .anim-fade-in { animation: fadeIn 0.3s ease both; }

    .wizard-input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      color: var(--dark);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .wizard-input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(91,75,231,0.10);
    }
    .wizard-input::placeholder { color: var(--soft); }
    textarea.wizard-input { resize: vertical; min-height: 96px; line-height: 1.6; }

    .pill-select {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--mid);
      transition: all 0.15s;
      user-select: none;
    }
    .pill-select:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-light); }
    .pill-select.active { border-color: var(--purple); background: var(--purple); color: #fff; }

    .area-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 24px 20px;
      border-radius: 16px;
      border: 2px solid var(--border);
      background: var(--white);
      cursor: pointer;
      transition: all 0.18s;
      text-align: center;
      min-height: 110px;
      user-select: none;
    }
    .area-card:hover { border-color: var(--purple); box-shadow: 0 4px 20px rgba(91,75,231,0.10); transform: translateY(-2px); }
    .area-card.active { border-color: var(--purple); background: var(--purple-light); }
    .area-card.active .area-icon { background: var(--purple); color: #fff; }

    .area-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      transition: all 0.18s;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px;
      background: var(--purple);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 16px rgba(91,75,231,0.25);
    }
    .btn-primary:hover { background: #4938D4; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(91,75,231,0.35); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 20px;
      background: transparent;
      color: var(--mid);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--purple); color: var(--purple); background: var(--purple-light); }

    .time-input {
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: var(--dark);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
      width: 100px;
    }
    .time-input:focus { border-color: var(--purple); }

    .topic-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
      cursor: grab;
      transition: all 0.15s;
    }
    .topic-row:hover { border-color: var(--purple-border); box-shadow: 0 2px 8px rgba(91,75,231,0.08); }
    .topic-row.dragging { opacity: 0.5; cursor: grabbing; }

    .ref-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .ref-value { font-size: 13px; color: var(--dark); font-weight: 500; line-height: 1.4; }

    .step-num {
      display: inline-flex;
      width: 28px; height: 28px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      background: var(--purple-light);
      color: var(--purple);
      flex-shrink: 0;
    }
    .step-num.done { background: var(--purple); color: #fff; }
    .step-num.active { background: var(--purple); color: #fff; box-shadow: 0 0 0 3px rgba(91,75,231,0.15); }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), #8B7EF8);
      border-radius: 99px;
      transition: width 0.4s cubic-bezier(.25,.8,.25,1);
    }

    .client-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .client-card:hover { border-color: var(--purple-border); }

    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .day-pill {
      padding: 8px 18px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      background: var(--white);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      color: var(--mid);
    }
    .day-pill:hover, .day-pill.active { border-color: var(--purple); background: var(--purple); color: #fff; }

    .success-check {
      width: 64px; height: 64px;
      background: var(--green-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    /* ── RUN-SHEET PREVIEW (operational agenda) ─────────────────────────── */
    .run-sheet {
      background: var(--white);
      border-radius: 14px;
      border: 1.5px solid var(--border);
      overflow: hidden;
      font-feature-settings: "tnum" 1, "ss01" 1;
    }
    .rs-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      background: linear-gradient(180deg, #FAFAFE 0%, #F6F7FB 100%);
      border-bottom: 1px solid var(--border);
    }
    .rs-day-title {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 17px;
      color: var(--navy);
      letter-spacing: -0.01em;
    }
    .rs-day-meta {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--purple);
      font-variant-numeric: tabular-nums;
    }
    .rs-pacing {
      display: flex;
      gap: 14px;
      padding: 10px 18px;
      background: var(--purple-light);
      border-bottom: 1px solid var(--purple-border);
      font-size: 11.5px;
      font-weight: 600;
      color: var(--purple);
      letter-spacing: 0.02em;
      font-variant-numeric: tabular-nums;
    }
    .rs-pacing strong { color: var(--navy); font-weight: 700; }
    .rs-blocks { padding: 0; }
    .rs-section {
      position: relative;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .rs-section:last-child { border-bottom: 0; }
    .rs-section::before {
      content: "";
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--rs-accent, var(--purple));
    }
    .rs-sec-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .rs-sec-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--rs-accent-dark, var(--navy));
    }
    .rs-sec-emoji {
      font-size: 14px;
      line-height: 1;
    }
    .rs-sec-time {
      font-size: 11.5px;
      font-weight: 700;
      color: var(--mid);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .rs-sec-time .dot { color: var(--soft); margin: 0 6px; }
    .rs-sec-time .dur { color: var(--rs-accent-dark, var(--purple)); }
    .rs-items {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .rs-item {
      display: grid;
      grid-template-columns: 52px 1fr auto;
      align-items: baseline;
      gap: 12px;
      padding: 4px 0 4px 6px;
      font-size: 13px;
      line-height: 1.45;
    }
    .rs-item-time {
      font-size: 12px;
      font-weight: 700;
      color: var(--rs-accent-dark, var(--purple));
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }
    .rs-item-title { color: var(--dark); font-weight: 500; }
    .rs-item-dur {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .rs-item-note {
      grid-column: 2 / 4;
      font-size: 11.5px;
      color: var(--mid);
      background: var(--bg);
      border-radius: 6px;
      padding: 5px 9px;
      margin-top: 3px;
      line-height: 1.45;
      border-left: 2px solid var(--purple-border);
    }
    .rs-break {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 18px;
      background: repeating-linear-gradient(
        135deg,
        #F6F7FB,
        #F6F7FB 6px,
        #FFFFFF 6px,
        #FFFFFF 12px
      );
      border-top: 1px dashed var(--border);
      border-bottom: 1px dashed var(--border);
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
    }
    .rs-break-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-style: normal;
      font-size: 11px;
      color: var(--mid);
    }
    .rs-break.lunch { background: #FFF8E6; border-color: #F0DBA0; color: #7A5A00; }
    .rs-break.lunch .rs-break-label { color: #7A5A00; }
    .rs-break.qa { background: var(--purple-light); border-color: var(--purple-border); color: var(--purple); }
    .rs-break.qa .rs-break-label { color: var(--purple); }
    .rs-break-time {
      font-size: 11.5px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: inherit;
    }
    .rs-empty {
      padding: 50px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* Sticky timeline rail (Step 4) */
    .rs-rail {
      position: sticky;
      top: 16px;
      max-height: calc(100vh - 200px);
      overflow-y: auto;
    }

    /* Day tabs (preview) */
    .rs-day-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .rs-day-tab {
      padding: 7px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--mid);
      transition: all 0.15s;
      font-family: var(--font-body);
    }
    .rs-day-tab:hover { border-color: var(--purple-border); color: var(--purple); }
    .rs-day-tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }

    @media print {
      body { background: #fff; }
      .run-sheet { border: 1px solid #999; box-shadow: none; }
      .rs-section, .rs-day-header { break-inside: avoid; }
    }
  </style>
</head>

// ── SMART AGENDA BUILDER ─────────────────────────────────────────────────────
// Input:  selectedAreas (string[]), familiarity, days, startTimes, endTimes, lunchStart, lunchDur
// Output: { day1: Topic[], day2: Topic[], ..., warnings: string[], totalMins: number }

function buildSmartAgenda({ selectedAreas, familiarity, days, structure }) {
  const areas = selectedAreas || [];
  if (areas.length === 0) return { days: {}, warnings: [], totalMins: 0 };

  // 1. Collect all topic keys, deduplicating shared ones (e.g. pf1 appears in Sales + Lettings)
  const seen = new Set();
  const allKeys = [];
  areas.forEach(area => {
    (AREA_TOPIC_KEYS[area] || []).forEach(k => {
      if (!seen.has(k)) { seen.add(k); allKeys.push(k); }
    });
  });

  // 2. Fetch topic objects, filter by area selection, sort by phase
  let allTopics = allKeys
    .map(k => TOPIC_LIBRARY[k] ? { id: k, ...TOPIC_LIBRARY[k] } : null)
    .filter(Boolean)
    .filter(t => {
      // Only include if the topic's area is selected, or if it's a shared foundation
      const sharedAreas = ["Settings & Core Platform"];
      return areas.includes(t.area) || sharedAreas.includes(t.area) ||
        (areas.some(a => ["Sales","Lettings"].includes(a)) && ["pf1","pf2","prop1","prop2","prop3","vv1","vv4"].includes(t.id));
    })
    .sort((a, b) => a.phase - b.phase);

  // 3. For Power Users / Regular Users: remove slow foundational items
  if (familiarity === "Power users") {
    allTopics = allTopics.filter(t => !["pf1","pf2","pf7","pf8","prop4","vv5"].includes(t.id));
    allTopics = allTopics.map(t => ({ ...t, dur: Math.round(t.dur * 0.8) }));
  } else if (familiarity === "Regular users") {
    allTopics = allTopics.filter(t => !["pf8"].includes(t.id));
    allTopics = allTopics.map(t => ({ ...t, dur: Math.round(t.dur * 0.9) }));
  }

  // 4. Calculate available minutes per day
  const dayMins = Array.from({ length: days }).map((_, i) => {
    const times = structure.dayTimes?.[i] || {};
    const start = times.start || "10:30";
    const end   = times.end   || "16:30";
    const toMin = t => { const [h,m] = t.split(":").map(Number); return h*60+m; };
    const lunchMins = parseInt(structure.lunchDur) || 30;
    return Math.max(0, toMin(end) - toMin(start) - lunchMins);
  });

  // Reserve ~10% of each day for Q&A / breaks naturally
  const usableMins = dayMins.map(m => Math.floor(m * 0.88));
  const totalUsable = usableMins.reduce((a,b) => a+b, 0);
  const totalContent = allTopics.reduce((a, t) => a + t.dur, 0);

  const warnings = [];
  if (totalContent > totalUsable) {
    const overBy = totalContent - totalUsable;
    const extraDaysNeeded = Math.ceil(overBy / (usableMins[0] || 300));
    warnings.push(`⚠️ The selected areas contain approximately ${totalContent} minutes of content — ${overBy} minutes more than fits in ${days} training day${days>1?"s":""}. Consider adding ${extraDaysNeeded} more day${extraDaysNeeded>1?"s":""}, or deselecting lower-priority areas.`);

    // Suggest deprioritisation based on phase order (highest phase = most optional)
    const optional = [...allTopics].sort((a,b) => b.phase - a.phase).slice(0, 3);
    if (optional.length) {
      warnings.push(`💡 To reduce load, consider removing: ${optional.map(t => `"${t.title}" (${t.dur} min)`).join(", ")}.`);
    }
  }

  // 5. Assign topics to days, keeping sections unbroken where possible
  const dayTopics = Array.from({ length: days }, () => []);
  let dayIdx = 0;
  let dayUsed = 0;

  // Group topics by section to avoid splitting them mid-section where possible
  const sections = [];
  let curSec = null;
  allTopics.forEach(t => {
    const secKey = t.area + ":::" + t.section;
    if (!curSec || curSec.key !== secKey) {
      curSec = { key: secKey, area: t.area, section: t.section, topics: [] };
      sections.push(curSec);
    }
    curSec.topics.push(t);
  });

  sections.forEach(sec => {
    const secMins = sec.topics.reduce((a,t) => a+t.dur, 0);
    // If section fits in current day, add it; otherwise start a new day
    const remaining = usableMins[dayIdx] - dayUsed;
    if (dayIdx < days - 1 && remaining < secMins * 0.5) {
      // Less than half the section fits — push to next day
      dayIdx = Math.min(dayIdx + 1, days - 1);
      dayUsed = 0;
    }
    sec.topics.forEach(t => {
      dayTopics[dayIdx].push(t);
      dayUsed += t.dur;
      if (dayUsed >= usableMins[dayIdx] && dayIdx < days - 1) {
        dayIdx++;
        dayUsed = 0;
      }
    });
  });

  // 6. Inject Q&A slots naturally after heavy sections
  const HEAVY_SECTION_THRESHOLD = 40; // minutes
  const finalDays = {};
  dayTopics.forEach((topics, di) => {
    const enriched = [];
    let sectionMins = 0;
    let prevSection = null;
    let qaCount = 0;

    topics.forEach((t, ti) => {
      const sectionChanged = prevSection && prevSection !== (t.area + t.section);
      if (sectionChanged && sectionMins >= HEAVY_SECTION_THRESHOLD) {
        enriched.push(QA_SLOT(`qa_${di}_${qaCount++}`, "Q&A — questions on what we've covered", 10));
        sectionMins = 0;
      }
      if (sectionChanged) sectionMins = 0;
      enriched.push(t);
      sectionMins += t.dur;
      prevSection = t.area + t.section;
    });

    // Add closing Q&A to every day
    enriched.push(QA_SLOT(`qa_${di}_close`, "Open Q&A, recap & agreed next steps", 20));
    finalDays[`day${di+1}`] = enriched;
  });

  return {
    days: finalDays,
    warnings,
    totalMins: totalContent,
    totalUsable,
  };
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const cols = []; let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') inQ = !inQ;
      else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cols[i] || "").replace(/^"|"$/g, ""); });
    return obj;
  });
}

function addMinutes(timeStr, mins) {
  if (!timeStr) return "";
  const [h, m] = timeStr.split(":").map(Number);
  const total = h * 60 + m + mins;
  return `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
}

function buildTimeline(topics, startTime, lunchStart, lunchDur) {
  const items = [];
  let cur = startTime || "10:30";
  const ls = lunchStart || "12:30";
  let lunchInserted = false;

  for (const t of topics) {
    if (!lunchInserted && cur >= ls) {
      items.push({ id: "lunch", title: "Lunch break", dur: parseInt(lunchDur) || 30, time: cur, isLunch: true });
      cur = addMinutes(cur, parseInt(lunchDur) || 30);
      lunchInserted = true;
    }
    items.push({ ...t, time: cur });
    cur = addMinutes(cur, t.dur || 30);
  }
  if (!lunchInserted) {
    items.push({ id: "lunch", title: "Lunch break", dur: parseInt(lunchDur) || 30, time: cur, isLunch: true });
  }
  return items;
}

function fmtDuration(mins) {
  if (!mins) return "0m";
  if (mins < 60) return `${mins}m`;
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return m === 0 ? `${h}h` : `${h}h ${m}m`;
}

// Group timeline items into operational blocks. Section blocks contain consecutive
// same-section items; lunch / break / Q&A items become their own standalone blocks.
function groupTimelineBlocks(timeline) {
  const blocks = [];
  let curSection = null;
  timeline.forEach(item => {
    if (item.isLunch) {
      blocks.push({ type: "lunch", label: "Lunch break", startTime: item.time, dur: item.dur || 30 });
      curSection = null; return;
    }
    if (item.isBreak) {
      blocks.push({ type: "break", label: item.title || "Short comfort break", startTime: item.time, dur: item.dur || 10 });
      curSection = null; return;
    }
    if (item.isQA) {
      blocks.push({ type: "qa", label: item.title || "Q&A", startTime: item.time, dur: item.dur || 15 });
      curSection = null; return;
    }
    const sec = item.section || "General";
    if (curSection && curSection.label === sec) {
      curSection.items.push(item);
      curSection.dur += (item.dur || 0);
    } else {
      curSection = { type: "section", label: sec, startTime: item.time, dur: item.dur || 0, items: [item] };
      blocks.push(curSection);
    }
  });
  return blocks;
}

function generateDocx(wizard) {
  const { client, structure, selectedAreas, agenda, logistics } = wizard;
  const areas = selectedAreas?.selected || [];
  const dayAssignment = selectedAreas?.dayAssignment || {};
  const days = structure.days || 1;

  const escXml = s => (s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/\u2019/g, "&#x2019;")
    .replace(/\u2018/g, "&#x2018;")
    .replace(/\u201C/g, "&#x201C;")
    .replace(/\u201D/g, "&#x201D;");

  // ── Shared cell/para builders ────────────────────────────────────────────────
  const cellPara = (text, bold = false, color = "") => {
    const rPr = [
      bold ? "<w:b/><w:bCs/>" : "",
      color ? `<w:color w:val="${color}"/>` : "",
      `<w:rFonts w:ascii="Questrial" w:hAnsi="Questrial" w:cs="Questrial"/>`,
    ].filter(Boolean).join("");
    return `<w:p>
      <w:pPr><w:spacing w:after="0" w:line="240" w:lineRule="auto"/><w:ind w:left="0" w:firstLine="0"/></w:pPr>
      <w:r><w:rPr>${rPr}</w:rPr><w:t xml:space="preserve">${escXml(text)}</w:t></w:r>
    </w:p>`;
  };

  const tableRow = (labelText, valueContent, labelBold = true) => `
    <w:tr>
      <w:trPr><w:cantSplit w:val="0"/></w:trPr>
      <w:tc>
        <w:tcPr>
          <w:tcW w:w="3795" w:type="dxa"/>
          <w:shd w:fill="auto" w:val="clear"/>
          <w:tcMar><w:top w:w="100" w:type="dxa"/><w:left w:w="100" w:type="dxa"/><w:bottom w:w="100" w:type="dxa"/><w:right w:w="100" w:type="dxa"/></w:tcMar>
        </w:tcPr>
        ${cellPara(labelText, labelBold)}
      </w:tc>
      <w:tc>
        <w:tcPr>
          <w:tcW w:w="7320" w:type="dxa"/>
          <w:shd w:fill="auto" w:val="clear"/>
          <w:tcMar><w:top w:w="100" w:type="dxa"/><w:left w:w="100" w:type="dxa"/><w:bottom w:w="100" w:type="dxa"/><w:right w:w="100" w:type="dxa"/></w:tcMar>
        </w:tcPr>
        ${valueContent}
      </w:tc>
    </w:tr>`;

  const simpleRow = (label, value) => tableRow(label, cellPara(value || "—"), true);

  // ── Format date for display ─────────────────────────────────────────────────
  const fmtDate = raw => {
    if (!raw) return "—";
    if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
      try {
        return new Date(raw + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
      } catch (_) { return raw; }
    }
    return raw;
  };

  // ── Build date display ──────────────────────────────────────────────────────
  const dayDates = structure.dayDates || [];
  let dateDisplay = "";
  if (days === 1) {
    dateDisplay = fmtDate(dayDates[0]) || fmtDate(client.trainingDate) || "—";
  } else {
    dateDisplay = Array.from({ length: days }, (_, i) => {
      const d = fmtDate(dayDates[i]);
      return d && d !== "—" ? `Day ${i+1}: ${d}` : `Day ${i+1}`;
    }).join("\n");
  }

  // ── Build session timing ────────────────────────────────────────────────────
  const dayTimes = structure.dayTimes || [];
  const t0 = dayTimes[0] || { start: "10:30", end: "16:30" };
  const timingDisplay = days > 1
    ? Array.from({ length: days }, (_, i) => {
        const t = dayTimes[i] || { start: "10:30", end: "16:30" };
        return `Day ${i+1}: ${t.start} – ${t.end}`;
      }).join("  |  ")
    : `${t0.start} – ${t0.end}`;

  // ── Areas/modules section ───────────────────────────────────────────────────
  const AREA_EMOJI = {
    "Settings & Core Platform": "⚙️",
    "Sales": "🏡",
    "Lettings": "🔑",
    "Property Management": "🔧",
    "Accounting": "📊",
    "Reporting & Analytics": "📈",
    "Integrations": "🔗",
  };

  // Build areas value — if multi-day, group by day
  let areasValueXml = "";
  if (days > 1 && Object.keys(dayAssignment).length > 0) {
    // Group by day
    const byDay = {};
    areas.forEach(area => {
      const d = dayAssignment[area] || 0;
      if (!byDay[d]) byDay[d] = [];
      byDay[d].push(area);
    });
    const sortedDays = Object.keys(byDay).sort((a,b) => Number(a) - Number(b));
    areasValueXml = sortedDays.map(d => {
      const label = d === "0" ? "All days" : `Day ${d}`;
      const areaList = byDay[d].map(a => `${AREA_EMOJI[a] || ""} ${a}`).join(", ");
      return cellPara(`${label}: ${areaList}`);
    }).join("");
  } else {
    areasValueXml = areas.map(a => cellPara(`${AREA_EMOJI[a] || ""} ${a}`)).join("") || cellPara("—");
  }

  // ── Agenda section per day — RUN-SHEET STYLE ────────────────────────────────
  // Section emojis give trainers a fast visual anchor as they glance through the day
  const SECTION_EMOJI = {
    "Opening":                   "▶",
    "Platform Setup":            "⚙",
    "Properties":                "🏠",
    "Valuations":                "💷",
    "Viewings":                  "🚪",
    "Sales Pipeline":            "📈",
    "Offers & Sales Progression":"🤝",
    "Client Experience":         "📱",
    "Lettings Applications":     "🔑",
    "Tenancy Management":        "📋",
    "Maintenance":               "🔧",
    "Compliance & Certificates": "✅",
    "Accounting Setup":          "💼",
    "Money In":                  "💰",
    "Money Out":                 "💸",
    "Statements & Reporting":    "📊",
    "Advanced Accounting":       "📑",
    "Reporting":                 "📊",
    "Integrations":              "🔗",
    "General":                   "▪",
    "Custom":                    "📌",
  };

  const fmtDur = mins => {
    if (!mins) return "0m";
    if (mins < 60) return `${mins}m`;
    const h = Math.floor(mins/60);
    const m = mins % 60;
    return m === 0 ? `${h}h` : `${h}h ${m}m`;
  };

  // Flexible paragraph builder for agenda body — supports indent, spacing, italics, font size, shading
  const agendaPara = (text, opts = {}) => {
    const { bold = false, color = "", indent = 0, before = 0, after = 0, italic = false, fontSize = 0, shade = "" } = opts;
    const sizeXml = fontSize ? `<w:sz w:val="${fontSize * 2}"/><w:szCs w:val="${fontSize * 2}"/>` : "";
    const rPr = [
      bold ? "<w:b/><w:bCs/>" : "",
      italic ? "<w:i/><w:iCs/>" : "",
      color ? `<w:color w:val="${color}"/>` : "",
      sizeXml,
      `<w:rFonts w:ascii="Questrial" w:hAnsi="Questrial" w:cs="Questrial"/>`,
    ].filter(Boolean).join("");
    const shadingXml = shade ? `<w:shd w:val="clear" w:color="auto" w:fill="${shade}"/>` : "";
    return `<w:p>
      <w:pPr>
        <w:spacing w:before="${before}" w:after="${after}" w:line="276" w:lineRule="auto"/>
        <w:ind w:left="${indent}" w:firstLine="0"/>
        ${shadingXml}
      </w:pPr>
      <w:r><w:rPr>${rPr}</w:rPr><w:t xml:space="preserve">${escXml(text)}</w:t></w:r>
    </w:p>`;
  };

  // Render the agenda as full-width body content (NOT inside a table cell) so each
  // day has the entire page width to breathe.
  const agendaSectionsXml = Object.keys(agenda).filter(k => k.startsWith("day")).sort().map((dayKey, di) => {
    const dayTopics = agenda[dayKey] || [];
    const startTime = dayTimes[di]?.start || "10:30";
    const endTime   = dayTimes[di]?.end   || "16:30";
    const timeline = buildTimeline(dayTopics, startTime, structure.lunchStart || "12:30", structure.lunchDur || 30);
    const dayLabel = days > 1 ? `Day ${di + 1} Agenda` : "Session Agenda";
    const dayDateStr = fmtDate(dayDates[di]);
    const headerLabel = dayDateStr && dayDateStr !== "—" ? `${dayLabel}  —  ${dayDateStr}` : dayLabel;

    // Group consecutive same-section items into "blocks" — section blocks read like
    // modules, while breaks/lunch/Q&A appear as their own standalone rows so trainers
    // never lose visibility of pacing milestones.
    const blocks = [];
    let curSection = null;
    timeline.forEach(item => {
      if (item.isLunch) {
        blocks.push({ type: "lunch", label: "Lunch", startTime: item.time, dur: item.dur || 30 });
        curSection = null; return;
      }
      if (item.isBreak) {
        blocks.push({ type: "break", label: item.title || "Short comfort break", startTime: item.time, dur: item.dur || 10 });
        curSection = null; return;
      }
      if (item.isQA) {
        blocks.push({ type: "qa", label: item.title || "Q&A", startTime: item.time, dur: item.dur || 15 });
        curSection = null; return;
      }
      const sec = item.section || "General";
      if (curSection && curSection.label === sec) {
        curSection.items.push(item);
        curSection.dur += (item.dur || 0);
      } else {
        curSection = { type: "section", label: sec, startTime: item.time, dur: item.dur || 0, items: [item] };
        blocks.push(curSection);
      }
    });

    // Day pacing summary
    const totalContent = blocks.filter(b => b.type === "section").reduce((a,b) => a + b.dur, 0);
    const totalBreaks  = blocks.filter(b => b.type !== "section").reduce((a,b) => a + b.dur, 0);
    const sectionCount = blocks.filter(b => b.type === "section").length;

    const lines = [];
    // Big day heading
    lines.push(agendaPara(
      `📋  ${headerLabel}`,
      { bold: true, color: "12152A", fontSize: 18, before: di === 0 ? 0 : 480, after: 80 }
    ));
    // Pacing summary line
    lines.push(agendaPara(
      `🕘  ${startTime} – ${endTime}    ·    ${sectionCount} module${sectionCount === 1 ? "" : "s"}    ·    ${fmtDur(totalContent)} content + ${fmtDur(totalBreaks)} breaks`,
      { color: "5B4BE7", bold: true, after: 200 }
    ));

    blocks.forEach((b, bi) => {
      const blockEnd = addMinutes(b.startTime, b.dur);
      const isFirst = bi === 0;

      if (b.type === "section") {
        const emoji = SECTION_EMOJI[b.label] || "▪";
        // Bold section header: e.g. "⚙  PLATFORM SETUP — 11:00–12:30  ·  1h 30m"
        lines.push(agendaPara(
          `${emoji}  ${b.label.toUpperCase()}  —  ${b.startTime}–${blockEnd}  ·  ${fmtDur(b.dur)}`,
          { bold: true, color: "12152A", before: isFirst ? 0 : 200, after: 60 }
        ));
        // Bullet item lines: time + topic + duration
        b.items.forEach(it => {
          lines.push(agendaPara(
            `      •  ${it.time}    ${it.title}    (${fmtDur(it.dur)})`,
            { color: "4A4E72", indent: 80, before: 0, after: 0 }
          ));
        });
      } else if (b.type === "lunch") {
        lines.push(agendaPara(
          `🍽  LUNCH BREAK  —  ${b.startTime}–${blockEnd}  ·  ${fmtDur(b.dur)}`,
          { bold: true, italic: true, color: "8E93BB", before: 200, after: 60 }
        ));
      } else if (b.type === "break") {
        lines.push(agendaPara(
          `☕  ${b.label}  —  ${b.startTime}–${blockEnd}  ·  ${fmtDur(b.dur)}`,
          { italic: true, color: "8E93BB", before: 160, after: 60 }
        ));
      } else if (b.type === "qa") {
        lines.push(agendaPara(
          `💬  ${b.label}  —  ${b.startTime}–${blockEnd}  ·  ${fmtDur(b.dur)}`,
          { italic: true, bold: true, color: "5B4BE7", before: 160, after: 60 }
        ));
      }
    });

    return lines.length > 0 ? lines.join("") : agendaPara("Agenda to be confirmed", { color: "8E93BB", italic: true });
  }).join("");

  // ── Logistics ───────────────────────────────────────────────────────────────
  const locationText = logistics.location || client.location || "—";
  const logisticsContent = [
    logistics.parking && `🅿️ Parking: ${logistics.parking}`,
    logistics.wifi && `📶 Wi-Fi: ${logistics.wifi}`,
    logistics.equipment && `💻 Equipment: ${logistics.equipment}`,
    logistics.followup && `📋 Follow-up: ${logistics.followup}`,
    client.venueSetup && `✅ Venue setup: ${client.venueSetup}`,
  ].filter(Boolean);
  const logisticsValueXml = logisticsContent.length
    ? logisticsContent.map(l => cellPara(l)).join("")
    : cellPara(locationText);

  // ── Attendees — parse to list ───────────────────────────────────────────────
  const attendeesRaw = client.attendees || "";
  const attendeesValueXml = cellPara(attendeesRaw || "—");

  // ── Priorities ──────────────────────────────────────────────────────────────
  const priorityLines = (client.priorities || "").split("\n").filter(Boolean);
  const prioritiesXml = priorityLines.length
    ? priorityLines.map(p => cellPara(p.replace(/^\d+\.\s*/, ""))).join("")
    : cellPara("—");

  // ── Cover table — only the 7 key fields, kept compact on the first page ─────
  // Note: literal "&" in label strings — escXml will handle escaping. Don't pre-escape
  // (pre-escaping caused "&amp;" to appear as "&amp;amp;" in the rendered document).
  const tblXml = `
  <w:tbl>
    <w:tblPr>
      <w:tblW w:w="11115" w:type="dxa"/>
      <w:jc w:val="left"/>
      <w:tblInd w:w="-900" w:type="dxa"/>
      <w:tblBorders>
        <w:top w:color="000000" w:space="0" w:sz="8" w:val="single"/>
        <w:left w:color="000000" w:space="0" w:sz="8" w:val="single"/>
        <w:bottom w:color="000000" w:space="0" w:sz="8" w:val="single"/>
        <w:right w:color="000000" w:space="0" w:sz="8" w:val="single"/>
        <w:insideH w:color="000000" w:space="0" w:sz="8" w:val="single"/>
        <w:insideV w:color="000000" w:space="0" w:sz="8" w:val="single"/>
      </w:tblBorders>
      <w:tblLayout w:type="fixed"/>
    </w:tblPr>
    <w:tblGrid>
      <w:gridCol w:w="3795"/>
      <w:gridCol w:w="7320"/>
    </w:tblGrid>
    ${simpleRow("📅 Date(s) of training", dateDisplay)}
    ${simpleRow("⏰ Session timing", timingDisplay)}
    ${tableRow("📍 Location & Logistics", logisticsValueXml, true)}
    ${simpleRow("📍 Client / Company", client.company || "—")}
    ${simpleRow("Stakeholder (Authorising Training)", [client.stakeholder, client.stakeholderPhone].filter(Boolean).join(" — ") || "—")}
    ${tableRow("Attendees & Roles", attendeesValueXml, true)}
    ${tableRow("Topics & Modules to Cover", areasValueXml, true)}
  </w:tbl>`;

  // ── Trailing context — rendered as full-width labelled sections AFTER the agenda ──
  const ctxHeading = (text) => agendaPara(text, { bold: true, color: "12152A", fontSize: 13, before: 320, after: 80 });
  const ctxBody    = (text) => agendaPara(text || "—", { color: "4A4E72", after: 0 });

  const contextSectionsXml = (() => {
    const out = [];
    if (priorityLines.length) {
      out.push(ctxHeading("Training Context & Goals"));
      priorityLines.forEach(p => {
        out.push(agendaPara(`•  ${p.replace(/^\d+\.\s*/, "")}`, { color: "4A4E72", indent: 80, after: 0 }));
      });
    }
    if (client.familiar) { out.push(ctxHeading("Familiarity with Street")); out.push(ctxBody(client.familiar)); }
    if (client.features) { out.push(ctxHeading("Specific workflows / features")); out.push(ctxBody(client.features)); }
    if (client.followUp) { out.push(ctxHeading("Post-training support")); out.push(ctxBody(client.followUp)); }
    if (client.anything) { out.push(ctxHeading("Additional notes")); out.push(ctxBody(client.anything)); }
    return out.join("");
  })();

  // Page break between the cover table and the agenda — keeps the cover sheet clean
  const pageBreak = `<w:p><w:r><w:br w:type="page"/></w:r></w:p>`;

  // ── Full document XML ───────────────────────────────────────────────────────
  const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:wpc="http://schemas.microsoft.com/office/word/2010/wordprocessingCanvas"
  xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006"
  xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"
  xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"
  xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"
  xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"
  xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"
  xmlns:w14="http://schemas.microsoft.com/office/word/2010/wordml">
  <w:body>
    <w:p>
      <w:pPr><w:pStyle w:val="Title"/></w:pPr>
      <w:r><w:t xml:space="preserve">${escXml(client.company || "Client Name")} x Street Group</w:t></w:r>
    </w:p>
    <w:p>
      <w:pPr><w:spacing w:after="120"/></w:pPr>
      <w:r>
        <w:rPr>
          <w:rFonts w:ascii="Questrial" w:hAnsi="Questrial" w:cs="Questrial"/>
          <w:color w:val="666666"/>
          <w:sz w:val="32"/>
        </w:rPr>
        <w:t>Training Agenda</w:t>
      </w:r>
    </w:p>
    ${tblXml}
    ${pageBreak}
    ${agendaSectionsXml}
    ${contextSectionsXml}
    <w:p>
      <w:pPr><w:spacing w:before="240" w:after="0"/></w:pPr>
      <w:r>
        <w:rPr>
          <w:rFonts w:ascii="Questrial" w:hAnsi="Questrial" w:cs="Questrial"/>
          <w:color w:val="888888"/>
          <w:sz w:val="16"/>
          <w:i/>
        </w:rPr>
        <w:t xml:space="preserve">Please note: Whilst we always aim to cover all areas outlined within this agenda, training sessions are designed to remain flexible and collaborative based on the needs of the team on the day. Client questions, workflow discussions, and unique business scenarios may naturally result in additional areas being explored outside of the planned agenda. The agenda should therefore be considered a guide and base structure for the session rather than a fixed schedule. Where possible, all planned topics will still be covered; however, depending on the level of discussion and interaction throughout the day, some areas may require follow-up sessions to explore further. Additional sessions may be recommended where appropriate. Refunds or partial refunds will not be issued where agenda items are not fully completed during the scheduled training session.</w:t>
      </w:r>
    </w:p>
    <w:sectPr>
      <w:pgSz w:w="11906" w:h="16838"/>
      <w:pgMar w:top="1134" w:right="845" w:bottom="1134" w:left="1701"/>
    </w:sectPr>
  </w:body>
</w:document>`;

  const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
  <w:docDefaults>
    <w:rPrDefault><w:rPr>
      <w:rFonts w:ascii="Questrial" w:hAnsi="Questrial" w:cs="Questrial"/>
      <w:sz w:val="22"/>
    </w:rPr></w:rPrDefault>
  </w:docDefaults>
  <w:style w:type="paragraph" w:default="1" w:styleId="Normal">
    <w:name w:val="Normal"/>
    <w:rPr><w:sz w:val="22"/></w:rPr>
  </w:style>
  <w:style w:type="paragraph" w:styleId="Title">
    <w:name w:val="Title"/>
    <w:basedOn w:val="Normal"/>
    <w:pPr><w:spacing w:after="80"/></w:pPr>
    <w:rPr>
      <w:rFonts w:ascii="Questrial" w:hAnsi="Questrial" w:cs="Questrial"/>
      <w:b/>
      <w:sz w:val="52"/>
    </w:rPr>
  </w:style>
</w:styles>`;

  const relsXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>
</Relationships>`;

  const appRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
  <Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/>
</Types>`;

  return { docXml, stylesXml, relsXml, appRels, contentTypes };
}

async function downloadDocx(wizard) {
  const { JSZip } = window;
  if (!JSZip) { alert("JSZip not loaded"); return; }
  const { docXml, stylesXml, relsXml, appRels, contentTypes } = generateDocx(wizard);
  const zip = new JSZip();
  zip.file("[Content_Types].xml", contentTypes);
  zip.folder("_rels").file(".rels", appRels);
  const word = zip.folder("word");
  word.file("document.xml", docXml);
  word.file("styles.xml", stylesXml);
  word.folder("_rels").file("document.xml.rels", relsXml);
  const blob = await zip.generateAsync({ type: "blob" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${(wizard.client.company || "Training").replace(/\s+/g, "_")}_x_Street_Group_Training_Agenda.docx`;
  a.click();
  URL.revokeObjectURL(url);
}

function StreetLogo() {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <svg width="28" height="28" viewBox="0 0 26 26" fill="none">
        <rect width="26" height="26" rx="7" fill="#5B4BE7"/>
        <path d="M7 10.5C7 9.12 8.12 8 9.5 8H16.5C17.88 8 19 9.12 19 10.5C19 11.88 17.88 13 16.5 13H9.5C8.12 13 7 14.12 7 15.5C7 16.88 8.12 18 9.5 18H16.5" stroke="white" strokeWidth="2" strokeLinecap="round"/>
      </svg>
      <span style={{ fontFamily: "var(--font-body)", fontWeight: 700, fontSize: 15, color: "var(--navy)", letterSpacing: "0.01em" }}>street</span>
      <span style={{ fontFamily: "var(--font-body)", fontSize: 11, color: "var(--muted)", fontWeight: 500, letterSpacing: "0.06em", textTransform: "uppercase" }}>Training Planner</span>
    </div>

}

function ProgressStepper({ currentStep, steps }) {
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 0 }}>
      {steps.map((s, i) => {
        const done = i < currentStep;
        const active = i === currentStep;
        return (
          <React.Fragment key={s.id}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, minWidth: 60 }}>
              <div className={`step-num ${done ? "done" : active ? "active" : ""}`}>
                {done ? (
                  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                    <path d="M2 6l3 3 5-5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                ) : i + 1}
              </div>
              <span style={{ fontSize: 10, fontWeight: 600, letterSpacing: "0.04em", color: active ? "var(--purple)" : done ? "var(--muted)" : "var(--soft)", whiteSpace: "nowrap", textAlign: "center" }}>
                {s.title}
              </span>
            </div>
            {i < steps.length - 1 && (
              <div style={{ flex: 1, height: 1.5, background: done ? "var(--purple)" : "var(--border)", transition: "background 0.3s", marginBottom: 18, minWidth: 12 }} />
            )}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function ReferencePanel({ wizard, visible }) {
  const { client, structure, selectedAreas } = wizard;
  if (!visible || !client.company) return null;
  return (
    <div style={{ width: 240, flexShrink: 0, background: "var(--white)", borderLeft: "1.5px solid var(--border)", padding: "24px 20px", overflowY: "auto", display: "flex", flexDirection: "column", gap: 20 }}>
      <div>
        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 12 }}>Session Reference</div>
        <div style={{ display: "flex", flex: 1, flexDirection: "column", gap: 14 }}>
          {[
            ["Client", client.company],
            ["Trainer", client.trainer],
            ["Date(s)", client.trainingDate],
            ["Attendees", client.attendees],
            ["Familiarity", client.familiar],
            ["Location", client.location],
          ].filter(([, v]) => v && v !== "—").map(([label, val]) => (
            <div key={label}>
              <div className="ref-label">{label}</div>
              <div className="ref-value">{val}</div>
            </div>
          ))}
          {selectedAreas?.length > 0 && (
            <div>
              <div className="ref-label">Areas</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 4, marginTop: 2 }}>
                {selectedAreas.map(a => (
                  <span key={a} style={{ fontSize: 11, background: "var(--purple-light)", color: "var(--purple)", borderRadius: 6, padding: "2px 8px", fontWeight: 600 }}>{a}</span>
                ))}
              </div>
            </div>
          )}
          {client.priorities && client.priorities !== "—" && (
            <div>
              <div className="ref-label">Priorities</div>
              <div className="ref-value" style={{ fontSize: 12 }}>{client.priorities}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── STEP 1: CLIENT OVERVIEW ──────────────────────────────────────────────────
function StepClient({ data, onChange, rows, loading }) {
  const [selectedRow, setSelectedRow] = useState(null);
  const [search, setSearch] = useState("");

  const filtered = rows.filter(r => (r.company || "").toLowerCase().includes(search.toLowerCase()));

  const normaliseFamiliar = raw => {
    if (!raw || raw === "—") return "";
    const r = raw.toLowerCase();
    if (r.includes("complete beginner") || r.includes("new") || r.includes("just migrated") || r.includes("brand new")) return "New to Street";
    if (r.includes("power") || r.includes("advanced") || r.includes("heavy user")) return "Power users";
    if (r.includes("regular") || r.includes("consistent") || r.includes("daily")) return "Regular users";
    return "Some familiarity";
  };

  const selectRow = row => {
    setSelectedRow(row.company);
    // row._dayDates and row._trainingDays are pre-computed in mapRow (live data)
    // or built inline here for mock data rows
    const splitDates = (row.splitDates || []).filter(Boolean);
    const numDays = row._trainingDays || row.trainingDays || (splitDates.length > 1 ? splitDates.length : 1);
    const dayDatesArr = row._dayDates || Array.from({ length: 5 }, (_, i) => {
      if (splitDates[i]) return splitDates[i].slice(0, 10);
      return "";
    });
    onChange({
      company:          row.company || "",
      trainer:          row.trainer || "",
      stakeholder:      row.stakeholder || "",
      stakeholderPhone: row.stakeholderPhone || "",
      email:            row.email || "",
      attendees:        row.attendees || "",
      familiar:         normaliseFamiliar(row.familiar),
      trainingType:     row.trainingType || "",
      trainingDate:     row.trainingDate || "",
      goLive:           row.goLive || "",
      location:         row.location || "",
      priorities:       row.priorities || "",
      features:         row.features || "",
      areas:            row.areas || "",
      followUp:         row.followUp || "",
      parking:          row.parking || "",
      venueSetup:       row.venueSetup || "",
      anything:         row.anything || "",
      _trainingDays:    numDays,
      _dayDates:        dayDatesArr,
    });
  };

  const set = (k, v) => onChange({ ...data, [k]: v });

  return (
    <div className="anim-fade-up" style={{ display: "flex", flexDirection: "column", gap: 32 }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--purple)", marginBottom: 8 }}>Step 1 of 6</div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 400, fontSize: 34, lineHeight: 1.2, color: "var(--navy)", marginBottom: 12 }}>
          Who are we training today?
        </h2>
        <p style={{ color: "var(--muted)", fontSize: 16 }}>Select a client from your dashboard, or fill in the details manually.</p>
      </div>

      {/* Client picker */}
      {rows.length > 0 && (
        <div>
          <label className="field-label">Select from dashboard</label>
          <div style={{ position: "relative", marginBottom: 10 }}>
            <input className="wizard-input" placeholder="Search clients…" value={search} onChange={e => setSearch(e.target.value)} style={{ paddingLeft: 42 }} />
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)" }}>
              <circle cx="7" cy="7" r="5" stroke="#C5C8E0" strokeWidth="1.5"/>
              <path d="M11 11l3 3" stroke="#C5C8E0" strokeWidth="1.5" strokeLinecap="round"/>
            </svg>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6, maxHeight: 220, overflowY: "auto" }}>
            {filtered.map(row => (
              <button key={row.company} onClick={() => selectRow(row)} style={{
                textAlign: "left", padding: "12px 16px", borderRadius: 12,
                border: `1.5px solid ${selectedRow === row.company ? "var(--purple)" : "var(--border)"}`,
                background: selectedRow === row.company ? "var(--purple-light)" : "var(--white)",
                cursor: "pointer", transition: "all 0.15s",
              }}>
                <div style={{ fontWeight: 600, fontSize: 14, color: "var(--dark)", marginBottom: 2 }}>{row.company}</div>
                <div style={{ fontSize: 12, color: "var(--muted)" }}>{row.trainer} · {row.trainingDate}</div>
              </button>
            ))}
          </div>
        </div>
      )}
      {loading && <p style={{ color: "var(--muted)", fontSize: 14 }}>Loading clients…</p>}

      {/* Editable fields */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {[
          ["company", "Company name", "e.g. Ashtons Estate Agents"],
          ["trainer", "Assigned trainer", "e.g. James Walker"],
          ["stakeholder", "Stakeholder name", "e.g. Sarah Mitchell"],
          ["trainingDate", "Training date(s)", "e.g. 12th March 2025"],
        ].map(([k, label, ph]) => (
          <div key={k}>
            <label className="field-label">{label}</label>
            <input className="wizard-input" placeholder={ph} value={data[k] || ""} onChange={e => set(k, e.target.value)} />
          </div>
        ))}
      </div>

      <div>
        <label className="field-label">Attendees</label>
        <textarea className="wizard-input" placeholder="e.g. 8 — mixed sales and lettings team, 2 senior negotiators, 1 office manager"
          value={data.attendees || ""} onChange={e => set("attendees", e.target.value)} style={{ minHeight: 72 }} />
      </div>

      <div>
        <label className="field-label">Team familiarity with Street</label>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {FAMILIARITY_LEVELS.map(level => (
            <button key={level} className={`pill-select ${data.familiar === level ? "active" : ""}`} onClick={() => set("familiar", level)}>
              {level}
            </button>
          ))}
        </div>
      </div>

      <div>
        <label className="field-label">Top priorities (from onboarding form)</label>
        <textarea className="wizard-input" placeholder="e.g. 1. Lettings progression clarity&#10;2. Accounting confidence&#10;3. Reporting for management"
          value={data.priorities || ""} onChange={e => set("priorities", e.target.value)} />
      </div>
    </div>
  );
}

// ─── STEP 2: TRAINING STRUCTURE ───────────────────────────────────────────────
function StepStructure({ data, onChange, clientData }) {
  const set = (k, v) => onChange({ ...data, [k]: v });
  const DEFAULT_TIMES = () => Array.from({ length: 5 }, () => ({ start: "10:30", end: "16:30" }));
  const days = data.days || 1;
  const dayDates = data.dayDates || Array(5).fill("");
  const dayTimes = data.dayTimes || DEFAULT_TIMES();

  // On first render, pre-fill from client data if present
  useEffect(() => {
    const preDays = clientData?._trainingDays;
    const preDates = clientData?._dayDates;
    if (preDays && data.days === 1 && !data._prefilled) {
      onChange({ ...data, days: preDays, dayDates: preDates || Array(5).fill(""), _prefilled: true });
    }
  }, [clientData?._trainingDays]);

  const setDayDate = (i, v) => {
    const a = Array.from({ length: 5 }, (_, j) => dayDates[j] || "");
    a[i] = v;
    set("dayDates", a);
  };
  const setDayTime = (i, f, v) => {
    const a = Array.from({ length: 5 }, (_, j) => ({ ...(dayTimes[j] || { start: "10:30", end: "16:30" }) }));
    a[i] = { ...a[i], [f]: v };
    set("dayTimes", a);
  };

  return (
    <div className="anim-fade-up" style={{ display: "flex", flexDirection: "column", gap: 32 }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--purple)", marginBottom: 8 }}>Step 2 of 6</div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 400, fontSize: 34, lineHeight: 1.2, color: "var(--navy)", marginBottom: 12 }}>
          How is the training structured?
        </h2>
        <p style={{ color: "var(--muted)", fontSize: 16 }}>Training days, timings, and location.</p>
      </div>

      <div>
        <label className="field-label">Number of training days</label>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {[1, 2, 3, 4, 5].map(n => (
            <button key={n} className={`day-pill ${days === n ? "active" : ""}`} onClick={() => set("days", n)}>
              {n} {n === 1 ? "day" : "days"}
            </button>
          ))}
        </div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        {Array.from({ length: days }).map((_, i) => (
          <div key={i} className="client-card">
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--purple)", marginBottom: 14 }}>Day {i + 1}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr auto auto auto", gap: 12, alignItems: "end" }}>
              <div>
                <label className="field-label">Date</label>
                <input className="wizard-input" type="date" value={dayDates[i] || ""} onChange={e => setDayDate(i, e.target.value)} />
              </div>
              <div>
                <label className="field-label">Start</label>
                <input className="time-input" type="time" value={dayTimes[i]?.start || "10:30"} onChange={e => setDayTime(i, "start", e.target.value)} />
              </div>
              <div>
                <label className="field-label">Finish</label>
                <input className="time-input" type="time" value={dayTimes[i]?.end || "16:30"} onChange={e => setDayTime(i, "end", e.target.value)} />
              </div>
            </div>
          </div>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        <div>
          <label className="field-label">Lunch break start</label>
          <input className="time-input" type="time" value={data.lunchStart || "12:30"} onChange={e => set("lunchStart", e.target.value)} style={{ width: "100%" }} />
        </div>
        <div>
          <label className="field-label">Lunch duration (minutes)</label>
          <input className="wizard-input" type="number" min="30" max="120" step="15" value={data.lunchDur || 30} onChange={e => set("lunchDur", e.target.value)} />
        </div>
      </div>

      <div>
        <label className="field-label">Delivery method</label>
        <div style={{ display: "flex", gap: 8 }}>
          {["On-site", "Remote", "Hybrid"].map(opt => (
            <button key={opt} className={`pill-select ${data.remote === opt ? "active" : ""}`} onClick={() => set("remote", opt)}>
              {opt === "On-site" ? "🏢" : opt === "Remote" ? "💻" : "🔀"} {opt}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── STEP 3: AREAS ────────────────────────────────────────────────────────────
function StepAreas({ data, onChange, clientData, structure }) {
  const areas = data.selected || [];
  const days = structure?.days || 1;
  const dayAssignment = data.dayAssignment || {}; // { "Sales": 1, "Lettings": 2, ... }

  const toggle = area => {
    const next = areas.includes(area) ? areas.filter(a => a !== area) : [...areas, area];
    // Clean up day assignment if area removed
    const newDA = { ...dayAssignment };
    if (!next.includes(area)) delete newDA[area];
    onChange({ ...data, selected: next, dayAssignment: newDA });
  };

  const setDay = (area, day) => {
    onChange({ ...data, dayAssignment: { ...dayAssignment, [area]: day } });
  };

  // Pre-suggest based on client areas string
  useEffect(() => {
    if (clientData.areas && clientData.areas !== "—" && (!data.selected || data.selected.length === 0)) {
      const raw = clientData.areas.toLowerCase();
      const suggested = Object.keys(AREA_TOPIC_KEYS).filter(area => {
        const aLow = area.toLowerCase();
        return raw.includes(aLow.split(" ")[0]) || raw.includes(aLow);
      });
      if (suggested.length) onChange({ ...data, selected: suggested });
    }
  }, [clientData.areas]);

  const AREA_LIST = [
    { key: "Settings & Core Platform", emoji: "⚙️", desc: "Users, brands, portals, valuations" },
    { key: "Sales", emoji: "🏡", desc: "Applicants, offers, progression" },
    { key: "Lettings", emoji: "🔑", desc: "Applications, tenancies, renewals" },
    { key: "Property Management", emoji: "🔧", desc: "Maintenance, certificates, keys" },
    { key: "Accounting", emoji: "📊", desc: "Receipting, ledgers, statements" },
    { key: "Reporting & Analytics", emoji: "📈", desc: "Dashboards & financial reports" },
    { key: "Integrations", emoji: "🔗", desc: "Portals, WhatsApp, Goodlord" },
  ];

  const formatDayDate = (i) => {
    const dates = structure?.dayDates || [];
    const d = dates[i];
    if (!d) return `Day ${i + 1}`;
    // Convert yyyy-mm-dd to readable
    try {
      const dt = new Date(d + "T12:00:00");
      return `Day ${i + 1} — ${dt.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" })}`;
    } catch (_) { return `Day ${i + 1}`; }
  };

  return (
    <div className="anim-fade-up" style={{ display: "flex", flexDirection: "column", gap: 32 }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--purple)", marginBottom: 8 }}>Step 3 of 6</div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 400, fontSize: 34, lineHeight: 1.2, color: "var(--navy)", marginBottom: 12 }}>
          What are we covering?
        </h2>
        <p style={{ color: "var(--muted)", fontSize: 16 }}>Select the areas to include.{days > 1 ? " Then assign each to a training day." : ""} Pre-filled from the onboarding form.</p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(150px, 1fr))", gap: 12 }}>
        {AREA_LIST.map(({ key, emoji, desc }) => (
          <div key={key} className={`area-card ${areas.includes(key) ? "active" : ""}`} onClick={() => toggle(key)}>
            <div className="area-icon">{emoji}</div>
            <div style={{ fontSize: 13, fontWeight: 600, color: "var(--dark)", lineHeight: 1.3 }}>{key}</div>
            <div style={{ fontSize: 11, color: "var(--muted)", lineHeight: 1.4 }}>{desc}</div>
          </div>
        ))}
      </div>

      {/* Day assignment — only shown when multiple days selected */}
      {days > 1 && areas.length > 0 && (
        <div>
          <label className="field-label" style={{ marginBottom: 12 }}>Assign areas to training days</label>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {areas.map(area => (
              <div key={area} className="client-card" style={{ padding: "14px 18px", display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
                <div style={{ flex: 1, fontSize: 14, fontWeight: 600, color: "var(--dark)" }}>{area}</div>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {Array.from({ length: days }, (_, i) => (
                    <button
                      key={i}
                      onClick={() => setDay(area, i + 1)}
                      style={{
                        padding: "6px 14px", borderRadius: 100, fontSize: 12, fontWeight: 600, cursor: "pointer",
                        border: `1.5px solid ${dayAssignment[area] === i + 1 ? "var(--purple)" : "var(--border)"}`,
                        background: dayAssignment[area] === i + 1 ? "var(--purple)" : "var(--white)",
                        color: dayAssignment[area] === i + 1 ? "#fff" : "var(--mid)",
                        transition: "all 0.15s",
                      }}
                    >
                      {formatDayDate(i)}
                    </button>
                  ))}
                  <button
                    onClick={() => setDay(area, 0)}
                    style={{
                      padding: "6px 14px", borderRadius: 100, fontSize: 12, fontWeight: 600, cursor: "pointer",
                      border: `1.5px solid ${!dayAssignment[area] ? "var(--purple-border)" : "var(--border)"}`,
                      background: !dayAssignment[area] ? "var(--purple-light)" : "var(--white)",
                      color: !dayAssignment[area] ? "var(--purple)" : "var(--muted)",
                      transition: "all 0.15s",
                    }}
                  >
                    All days
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {areas.length > 0 && (
        <div style={{ background: "var(--purple-light)", borderRadius: 12, padding: "14px 18px", display: "flex", gap: 10, alignItems: "flex-start" }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ marginTop: 2, flexShrink: 0 }}>
            <circle cx="8" cy="8" r="7" stroke="#5B4BE7" strokeWidth="1.5"/>
            <path d="M8 5v4M8 11v.5" stroke="#5B4BE7" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <span style={{ fontSize: 13, color: "var(--purple)", fontWeight: 500 }}>
            {areas.length} area{areas.length > 1 ? "s" : ""} selected — the agenda builder will auto-populate topics for each.
          </span>
        </div>
      )}
    </div>
  );
}
