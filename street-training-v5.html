// ─── RUN-SHEET PREVIEW COMPONENT ──────────────────────────────────────────────
// The single source of truth for how the operational agenda *looks on screen*.
// Used in Step 4 (Agenda Builder, right column) and Step 6 (Generate, full-width preview).
function RunSheet({ wizard, dayKey = null, showNotes = false, dayLabel = null, dateLabel = null }) {
  const { structure, agenda } = wizard;
  const days = structure.days || 1;
  const dayKeys = dayKey ? [dayKey] : Array.from({ length: days }, (_, i) => `day${i + 1}`);
  const dayTimes = structure.dayTimes || [];
  const lunchStart = structure.lunchStart || "12:30";
  const lunchDur = structure.lunchDur || 30;

  return (
    <div className="run-sheet">
      {dayKeys.map((k, di) => {
        const idx = parseInt(k.replace("day", "")) - 1;
        const topics = agenda[k] || [];
        const startTime = dayTimes[idx]?.start || "10:30";
        const endTime = dayTimes[idx]?.end || "16:30";
        const timeline = buildTimeline(topics, startTime, lunchStart, lunchDur);
        const blocks = groupTimelineBlocks(timeline);

        const totalContent = blocks.filter(b => b.type === "section").reduce((a, b) => a + b.dur, 0);
        const totalBreaks  = blocks.filter(b => b.type !== "section").reduce((a, b) => a + b.dur, 0);
        const sectionCount = blocks.filter(b => b.type === "section").length;

        const headerLabel = dayLabel || (days > 1 ? `Day ${idx + 1}` : "Session Agenda");
        const showHeader = !dayKey || dayKey === k;

        if (timeline.length === 0) {
          return (
            <div key={k}>
              {showHeader && (
                <div className="rs-day-header">
                  <span className="rs-day-title">{headerLabel}</span>
                  <span className="rs-day-meta">{startTime} – {endTime}</span>
                </div>
              )}
              <div className="rs-empty">No topics yet — head back to Step 4 to build the agenda.</div>
            </div>
          );
        }

        return (
          <div key={k}>
            {showHeader && (
              <div className="rs-day-header">
                <span className="rs-day-title">
                  {headerLabel}
                  {dateLabel && <span style={{ fontFamily: "var(--font-body)", fontSize: 12, fontWeight: 500, color: "var(--muted)", marginLeft: 10, letterSpacing: 0 }}>· {dateLabel}</span>}
                </span>
                <span className="rs-day-meta">{startTime} – {endTime}</span>
              </div>
            )}
            <div className="rs-pacing">
              <span><strong>{sectionCount}</strong> module{sectionCount === 1 ? "" : "s"}</span>
              <span style={{ color: "var(--purple-border)" }}>·</span>
              <span><strong>{fmtDuration(totalContent)}</strong> content</span>
              <span style={{ color: "var(--purple-border)" }}>·</span>
              <span><strong>{fmtDuration(totalBreaks)}</strong> breaks &amp; Q&amp;A</span>
            </div>
            <div className="rs-blocks">
              {blocks.map((b, bi) => {
                const blockEnd = addMinutes(b.startTime, b.dur);
                if (b.type === "lunch") {
                  return (
                    <div key={bi} className="rs-break lunch">
                      <span className="rs-break-label">🍽 Lunch break</span>
                      <span className="rs-break-time">{b.startTime} – {blockEnd} · {fmtDuration(b.dur)}</span>
                    </div>
                  );
                }
                if (b.type === "break") {
                  return (
                    <div key={bi} className="rs-break">
                      <span className="rs-break-label">☕ {b.label}</span>
                      <span className="rs-break-time">{b.startTime} – {blockEnd} · {fmtDuration(b.dur)}</span>
                    </div>
                  );
                }
                if (b.type === "qa") {
                  return (
                    <div key={bi} className="rs-break qa">
                      <span className="rs-break-label">💬 {b.label}</span>
                      <span className="rs-break-time">{b.startTime} – {blockEnd} · {fmtDuration(b.dur)}</span>
                    </div>
                  );
                }
                // section
                const style = getSectionStyle(b.label);
                const emoji = SECTION_EMOJI_MAP[b.label] || "▪";
                return (
                  <div
                    key={bi}
                    className="rs-section"
                    style={{ "--rs-accent": style.dot, "--rs-accent-dark": style.color }}
                  >
                    <div className="rs-sec-head">
                      <span className="rs-sec-label">
                        <span className="rs-sec-emoji">{emoji}</span>
                        {b.label}
                      </span>
                      <span className="rs-sec-time">
                        {b.startTime} – {blockEnd}
                        <span className="dot">·</span>
                        <span className="dur">{fmtDuration(b.dur)}</span>
                      </span>
                    </div>
                    <div className="rs-items">
                      {b.items.map((it, ii) => (
                        <div key={it.id + ii} className="rs-item">
                          <span className="rs-item-time">{it.time}</span>
                          <span className="rs-item-title">{it.title}</span>
                          <span className="rs-item-dur">{fmtDuration(it.dur)}</span>
                          {showNotes && it.note && (
                            <div className="rs-item-note">💡 {it.note}</div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function DayLoadBar({ topics, usableMins }) {
  const contentMins = topics.filter(t => !t.isQA && !t.isBreak).reduce((a,t) => a+t.dur, 0);
  const qaMins = topics.filter(t => t.isQA || t.isBreak).reduce((a,t) => a+t.dur, 0);
  const totalMins = usableMins || 330;
  const contentPct = Math.min(100, (contentMins / totalMins) * 100);
  const qaPct = Math.min(100 - contentPct, (qaMins / totalMins) * 100);
  const overloaded = contentMins + qaMins > totalMins;
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: overloaded ? "#8B1C1C" : "var(--muted)" }}>
          Day capacity
        </span>
        <span style={{ fontSize: 12, fontWeight: 700, color: overloaded ? "#E05252" : "var(--purple)" }}>
          {contentMins + qaMins}m / {totalMins}m
          {overloaded && " ⚠️ over"}
        </span>
      </div>
      <div style={{ height: 6, background: "var(--border)", borderRadius: 99, overflow: "hidden", display: "flex" }}>
        <div style={{ width: `${contentPct}%`, background: overloaded ? "#E05252" : "var(--purple)", borderRadius: "99px 0 0 99px", transition: "width 0.3s" }} />
        <div style={{ width: `${qaPct}%`, background: "#C5C8E0", transition: "width 0.3s" }} />
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 6 }}>
        <span style={{ fontSize: 10, color: "var(--muted)" }}>● Content: {contentMins}m</span>
        <span style={{ fontSize: 10, color: "#C5C8E0" }}>● Q&A/Breaks: {qaMins}m</span>
      </div>
    </div>
  );
}

function StepAgenda({ data, onChange, wizard }) {
  const { structure, selectedAreas, client } = wizard;
  const days = structure.days || 1;
  const areas = selectedAreas?.selected || [];
  const familiarity = client?.familiar || "New to Street";

  const [newTopic, setNewTopic] = useState({});
  const [dragging, setDragging] = useState(null);
  const [dragOver, setDragOver] = useState(null);
  const [activeDay, setActiveDay] = useState("day1");
  const [showNotes, setShowNotes] = useState({});
  const [agendaBuilt, setAgendaBuilt] = useState(false);
  const [warnings, setWarnings] = useState([]);
  const [dismissedWarnings, setDismissedWarnings] = useState(false);

  // Build smart agenda on first entry or when areas/days change
  useEffect(() => {
    if (areas.length === 0) return;
    const result = buildSmartAgenda({ selectedAreas: areas, familiarity, days, structure });
    setWarnings(result.warnings || []);
    // Only auto-build if no manual edits have been made yet
    const hasManualData = Object.keys(data).some(k => k.startsWith("day") && data[k]?.length > 0);
    if (!hasManualData || !agendaBuilt) {
      onChange({ ...data, ...result.days });
      setAgendaBuilt(true);
    }
  }, [areas.join(","), days, familiarity]);

  const dayKey = activeDay;
  const dayIdx = parseInt(activeDay.replace("day", "")) - 1;
  const dayTopics = data[dayKey] || [];
  const startTime = structure.dayTimes?.[dayIdx]?.start || "10:30";
  const endTime = structure.dayTimes?.[dayIdx]?.end || "16:30";
  const toMin = t => { const [h,m] = (t||"10:30").split(":").map(Number); return h*60+m; };
  const usableMins = Math.max(0, toMin(endTime) - toMin(startTime) - (parseInt(structure.lunchDur)||30));
  const timeline = buildTimeline(dayTopics, startTime, structure.lunchStart || "12:30", structure.lunchDur || 30);

  const removeTopic = (id) => onChange({ ...data, [dayKey]: dayTopics.filter(t => t.id !== id) });

  const addTopic = () => {
    const text = (newTopic[dayKey] || "").trim();
    if (!text) return;
    const id = "custom_" + Date.now();
    onChange({ ...data, [dayKey]: [...dayTopics, { id, title: text, dur: 30, section: "Custom", area: "Custom" }] });
    setNewTopic(prev => ({ ...prev, [dayKey]: "" }));
  };

  const moveTopic = (fromIdx, toIdx) => {
    const arr = [...dayTopics];
    const [item] = arr.splice(fromIdx, 1);
    arr.splice(toIdx, 0, item);
    onChange({ ...data, [dayKey]: arr });
  };

  const updateDur = (id, val) => {
    onChange({ ...data, [dayKey]: dayTopics.map(t => t.id === id ? { ...t, dur: Math.max(5, parseInt(val) || 30) } : t) });
  };

  const rebuildAgenda = () => {
    const result = buildSmartAgenda({ selectedAreas: areas, familiarity, days, structure });
    setWarnings(result.warnings || []);
    onChange({ ...data, ...result.days });
    setDismissedWarnings(false);
  };

  // Group consecutive topics by section for the editor view
  const groupedTopics = useMemo(() => {
    const groups = [];
    let cur = null;
    dayTopics.forEach((t, idx) => {
      const label = t.isQA ? "Q&A" : t.isBreak ? "Break" : (t.section || "General");
      if (!cur || cur.label !== label) {
        cur = { label, topics: [], startIdx: idx };
        groups.push(cur);
      }
      cur.topics.push({ ...t, _idx: idx });
    });
    return groups;
  }, [dayTopics]);

  return (
    <div className="anim-fade-up" style={{ display: "flex", flexDirection: "column", gap: 24 }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--purple)", marginBottom: 8 }}>Step 4 of 6</div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 400, fontSize: 34, lineHeight: 1.2, color: "var(--navy)", marginBottom: 12 }}>
          Build the agenda
        </h2>
        <p style={{ color: "var(--muted)", fontSize: 16 }}>
          Auto-built in operational flow order — the way an estate agent actually uses the system.
          Reorder, remove, adjust timings, or add custom topics.
        </p>
      </div>

      {/* Warnings */}
      {warnings.length > 0 && !dismissedWarnings && (
        <div style={{ background: "#FFF8E6", border: "1.5px solid #E0AC1C", borderRadius: 14, padding: "16px 20px", display: "flex", flexDirection: "column", gap: 8 }}>
          {warnings.map((w, i) => (
            <div key={i} style={{ fontSize: 13, color: "#7A5A00", lineHeight: 1.5 }}>{w}</div>
          ))}
          <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
            <button className="btn-ghost" style={{ padding: "8px 16px", fontSize: 12 }} onClick={() => setDismissedWarnings(true)}>Dismiss</button>
          </div>
        </div>
      )}

      {/* Day tabs + rebuild */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          {Array.from({ length: days }).map((_, i) => {
            const k = `day${i + 1}`;
            const topicCount = (data[k] || []).filter(t => !t.isQA && !t.isBreak).length;
            return (
              <button key={k} className={`pill-select ${activeDay === k ? "active" : ""}`} onClick={() => setActiveDay(k)}>
                Day {i + 1}
                <span style={{ fontSize: 11, opacity: 0.75 }}>· {topicCount} topics</span>
              </button>
            );
          })}
        </div>
        <button className="btn-ghost" onClick={rebuildAgenda} style={{ padding: "8px 16px", fontSize: 13, display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M12 7A5 5 0 112 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
            <path d="M12 3v4h-4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
          Rebuild from scratch
        </button>
      </div>

      {/* Day load bar */}
      <DayLoadBar topics={dayTopics} usableMins={usableMins} />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>

        {/* Left: grouped topic editor */}
        <div>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)", marginBottom: 12 }}>
            Topics — drag to reorder
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {groupedTopics.map((group, gi) => {
              const style = getSectionStyle(group.label);
              return (
                <div key={gi}>
                  {/* Section label */}
                  <div style={{
                    display: "flex", alignItems: "center", gap: 6,
                    padding: "5px 10px", borderRadius: 8, marginBottom: 4,
                    background: style.bg,
                  }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: style.dot, flexShrink: 0 }} />
                    <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: style.color }}>{group.label}</span>
                    <span style={{ fontSize: 10, color: style.color, opacity: 0.6, marginLeft: "auto" }}>
                      {group.topics.reduce((a,t) => a+t.dur, 0)}m
                    </span>
                  </div>
                  {/* Topics */}
                  {group.topics.map((topic) => (
                    <div
                      key={topic.id}
                      className={`topic-row ${dragging === topic._idx ? "dragging" : ""}`}
                      draggable
                      onDragStart={() => setDragging(topic._idx)}
                      onDragOver={e => { e.preventDefault(); setDragOver(topic._idx); }}
                      onDrop={() => { if (dragging !== null && dragging !== topic._idx) moveTopic(dragging, topic._idx); setDragging(null); setDragOver(null); }}
                      onDragEnd={() => { setDragging(null); setDragOver(null); }}
                      style={{
                        borderColor: dragOver === topic._idx ? "var(--purple)" : topic.isQA ? "var(--border)" : topic.isBreak ? "var(--border)" : "var(--border)",
                        background: topic.isQA || topic.isBreak ? "var(--bg)" : "var(--white)",
                        opacity: topic.isQA || topic.isBreak ? 0.8 : 1,
                        marginBottom: 4,
                      }}
                    >
                      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style={{ flexShrink: 0, opacity: 0.25 }}>
                        <rect x="3" y="3" width="8" height="1.5" rx="1" fill="#12152A"/>
                        <rect x="3" y="6.25" width="8" height="1.5" rx="1" fill="#12152A"/>
                        <rect x="3" y="9.5" width="8" height="1.5" rx="1" fill="#12152A"/>
                      </svg>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, color: topic.isQA ? "var(--muted)" : "var(--dark)", fontWeight: topic.isQA ? 400 : 500, fontStyle: topic.isQA || topic.isBreak ? "italic" : "normal" }}>
                          {topic.title}
                        </div>
                        {topic.note && (
                          <button
                            onClick={() => setShowNotes(prev => ({ ...prev, [topic.id]: !prev[topic.id] }))}
                            style={{ fontSize: 10, color: "var(--purple)", background: "none", border: "none", cursor: "pointer", padding: 0, marginTop: 2, fontFamily: "var(--font-body)" }}
                          >
                            {showNotes[topic.id] ? "▲ Hide trainer note" : "▼ Trainer note"}
                          </button>
                        )}
                        {showNotes[topic.id] && topic.note && (
                          <div style={{ fontSize: 12, color: "var(--mid)", marginTop: 4, lineHeight: 1.5, background: "var(--purple-light)", borderRadius: 6, padding: "6px 10px" }}>
                            💡 {topic.note}
                          </div>
                        )}
                      </div>
                      {!topic.isQA && !topic.isBreak && (
                        <input
                          type="number" min="5" max="180" step="5"
                          value={topic.dur || 30}
                          onChange={e => updateDur(topic.id, e.target.value)}
                          style={{ width: 50, padding: "4px 6px", border: "1.5px solid var(--border)", borderRadius: 8, fontSize: 12, fontWeight: 700, color: "var(--purple)", textAlign: "center", outline: "none", background: "var(--white)" }}
                          title="Duration in minutes"
                        />
                      )}
                      {(topic.isQA || topic.isBreak) && (
                        <span style={{ fontSize: 12, color: "var(--muted)", minWidth: 30, textAlign: "right" }}>{topic.dur}m</span>
                      )}
                      {!topic.isQA && !topic.isBreak && <span style={{ fontSize: 10, color: "var(--soft)", flexShrink: 0 }}>min</span>}
                      <button onClick={() => removeTopic(topic.id)} style={{ background: "none", border: "none", cursor: "pointer", color: "var(--soft)", fontSize: 18, padding: "0 2px", lineHeight: 1, flexShrink: 0 }}>×</button>
                    </div>
                  ))}
                </div>
              );
            })}
          </div>

          {/* Add custom topic */}
          <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
            <input
              className="wizard-input"
              placeholder="Add a custom topic…"
              value={newTopic[dayKey] || ""}
              onChange={e => setNewTopic(prev => ({ ...prev, [dayKey]: e.target.value }))}
              onKeyDown={e => { if (e.key === "Enter") addTopic(); }}
              style={{ flex: 1, padding: "10px 14px", fontSize: 14 }}
            />
            <button className="btn-ghost" onClick={addTopic} style={{ padding: "10px 18px" }}>+ Add</button>
          </div>
        </div>

        {/* Right: run-sheet preview (operational view) */}
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)" }}>
              Trainer run-sheet · live preview
            </div>
            <div style={{ fontSize: 11, color: "var(--soft)", fontVariantNumeric: "tabular-nums" }}>
              {startTime} → {endTime}
            </div>
          </div>
          <div className="rs-rail">
            {timeline.length === 0 ? (
              <div className="run-sheet">
                <div className="rs-empty">
                  Select areas in Step 3 to auto-build your agenda.
                </div>
              </div>
            ) : (
              <RunSheet
                wizard={wizard}
                dayKey={dayKey}
                showNotes={false}
                dayLabel={days > 1 ? `Day ${dayIdx + 1}` : "Session Agenda"}
              />
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

        <div key={k}>

        </div>
      ))}
    </div>
  );

// ─── STEP 7: GENERATE ─────────────────────────────────────────────────────────
function StepGenerate({ wizard, onReset }) {
  const [jsZipLoaded, setJsZipLoaded] = useState(false);
  const [generating, setGenerating] = useState(false);
  const [done, setDone] = useState(false);
  const [error, setError] = useState("");
  const [previewDay, setPreviewDay] = useState("day1");
  const [showTrainerNotes, setShowTrainerNotes] = useState(true);

  useEffect(() => {
    if (!window.JSZip) {
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
      s.onload = () => setJsZipLoaded(true);
      s.onerror = () => setError("Could not load JSZip. Please check your connection.");
      document.head.appendChild(s);
    } else {
      setJsZipLoaded(true);
    }
  }, []);

  const handleDownload = async () => {
    setGenerating(true);
    setError("");
    try {
      await downloadDocx(wizard);
      setDone(true);
    } catch (e) {
      setError(e.message || "Something went wrong generating the document.");
    } finally {
      setGenerating(false);
    }
  };

  const { client, structure, selectedAreas, agenda } = wizard;
  const areas = selectedAreas?.selected || [];
  const dayCount = structure.days || 1;
  const totalTopics = Object.values(agenda).reduce((acc, arr) => acc + (arr?.length || 0), 0);

  if (done) {
    return (
      <div className="anim-fade-up" style={{ textAlign: "center", padding: "40px 0" }}>
        <div className="success-check">
          <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
            <path d="M6 15l7 7 11-11" stroke="#1B6B42" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        </div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 400, fontSize: 30, color: "var(--navy)", marginBottom: 12 }}>Document downloaded</h2>
        <p style={{ color: "var(--muted)", marginBottom: 32 }}>Your training plan for <strong>{client.company}</strong> is ready to review, edit, and send.</p>
        <div style={{ display: "flex", gap: 12, justifyContent: "center" }}>
          <button className="btn-ghost" onClick={handleDownload}>⬇ Download again</button>
          <button className="btn-primary" onClick={onReset}>Start a new session</button>
        </div>
      </div>
    );
  }

  // Date label for the currently-previewed day
  const previewIdx = parseInt(previewDay.replace("day", "")) - 1;
  const dayDates = structure.dayDates || [];
  const fmtDateShort = raw => {
    if (!raw) return "";
    if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
      try {
        return new Date(raw + "T12:00:00").toLocaleDateString("en-GB", { weekday: "long", day: "numeric", month: "long" });
      } catch (_) { return raw; }
    }
    return raw;
  };
  const previewDateLabel = fmtDateShort(dayDates[previewIdx]);

  return (
    <div className="anim-fade-up" style={{ display: "flex", flexDirection: "column", gap: 32 }}>
      <div>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: "0.06em", textTransform: "uppercase", color: "var(--purple)", marginBottom: 8 }}>Step 6 of 6</div>
        <h2 style={{ fontFamily: "var(--font-display)", fontWeight: 400, fontSize: 34, lineHeight: 1.2, color: "var(--navy)", marginBottom: 12 }}>
          Ready to generate
        </h2>
        <p style={{ color: "var(--muted)", fontSize: 16 }}>Review the run-sheet below, then download your Street-branded training document.</p>
      </div>

      {/* Summary */}
      <div className="client-card" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        {[
          ["Client", client.company],
          ["Trainer", client.trainer],
          ["Date(s)", client.trainingDate],
          ["Training days", `${dayCount} day${dayCount > 1 ? "s" : ""}`],
          ["Delivery", structure.remote || "On-site"],
          ["Topics total", `${totalTopics} topics across ${dayCount} day${dayCount > 1 ? "s" : ""}`],
        ].map(([label, val]) => (
          <div key={label}>
            <div className="ref-label">{label}</div>
            <div className="ref-value">{val || "—"}</div>
          </div>
        ))}
        <div style={{ gridColumn: "1 / -1" }}>
          <div className="ref-label">Areas covered</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 4 }}>
            {areas.map(a => (
              <span key={a} style={{ fontSize: 12, background: "var(--purple-light)", color: "var(--purple)", borderRadius: 8, padding: "3px 10px", fontWeight: 600 }}>{a}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Run-sheet preview — what trainers will follow on the day */}
      <div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 12 }}>
          <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.07em", textTransform: "uppercase", color: "var(--muted)" }}>
            Trainer run-sheet preview
          </div>
          <label style={{ display: "inline-flex", alignItems: "center", gap: 8, fontSize: 12.5, color: "var(--mid)", cursor: "pointer", userSelect: "none" }}>
            <input
              type="checkbox"
              checked={showTrainerNotes}
              onChange={e => setShowTrainerNotes(e.target.checked)}
              style={{ accentColor: "var(--purple)", width: 14, height: 14 }}
            />
            Show trainer notes &amp; reminders
          </label>
        </div>
        {dayCount > 1 && (
          <div className="rs-day-tabs">
            {Array.from({ length: dayCount }).map((_, i) => {
              const k = `day${i + 1}`;
              const dateStr = fmtDateShort(dayDates[i]);
              return (
                <button
                  key={k}
                  className={`rs-day-tab ${previewDay === k ? "active" : ""}`}
                  onClick={() => setPreviewDay(k)}
                  type="button"
                >
                  Day {i + 1}{dateStr ? ` · ${dateStr.split(",")[0]}` : ""}
                </button>
              );
            })}
          </div>
        )}
        <RunSheet
          wizard={wizard}
          dayKey={previewDay}
          showNotes={showTrainerNotes}
          dayLabel={dayCount > 1 ? `Day ${previewIdx + 1}` : "Session Agenda"}
          dateLabel={previewDateLabel}
        />
        <div style={{ marginTop: 10, fontSize: 11.5, color: "var(--muted)", display: "flex", alignItems: "center", gap: 6 }}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <circle cx="6" cy="6" r="5" stroke="currentColor" strokeWidth="1.2"/>
            <path d="M6 4v3M6 8v.01" stroke="currentColor" strokeWidth="1.2" strokeLinecap="round"/>
          </svg>
          The downloaded .docx mirrors this layout — section headers, time blocks, durations and breaks all preserved.
        </div>
      </div>

      {error && (
        <div style={{ background: "#FDEAED", border: "1.5px solid #f9b4bc", borderRadius: 12, padding: "12px 16px", fontSize: 14, color: "#9B1C2E" }}>
          {error}
        </div>
      )}

      <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
        <button className="btn-primary" onClick={handleDownload} disabled={generating || !jsZipLoaded} style={{ opacity: generating || !jsZipLoaded ? 0.7 : 1 }}>
          {generating ? (
            <>
              <div style={{ width: 16, height: 16, border: "2px solid rgba(255,255,255,0.4)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
              Generating…
            </>
          ) : (
            <>⬇ Download training plan (.docx)</>
          )}
        </button>
        {!jsZipLoaded && !error && <span style={{ fontSize: 13, color: "var(--muted)" }}>Loading document tools…</span>}
      </div>

      <p style={{ fontSize: 13, color: "var(--muted)" }}>
        The document is fully editable in Microsoft Word or Google Docs. Perfect for sending directly to your client.
      </p>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [step, setStep] = useState(0);
  const [rows, setRows] = useState(MOCK_ROWS);
  const [loading, setLoading] = useState(false);
  const [usingMock, setUsingMock] = useState(true);

  const [wizard, setWizard] = useState({
    client: {},
    structure: { days: 1, dayDates: [], dayTimes: Array.from({length:5}, () => ({start:"10:30",end:"16:30"})), lunchStart: "12:30", lunchDur: 30, remote: "On-site" },
    selectedAreas: { selected: [] },
    agenda: {},
    logistics: {},
  });

  const setSection = (key) => (data) => setWizard(prev => ({ ...prev, [key]: data }));

  // Try to load live data
  useEffect(() => {
    if (!SHEET_URL || SHEET_URL.includes("YOUR_")) return;
    setLoading(true);
    fetch(SHEET_URL + "?action=getData")
      .then(r => r.json())
      .then(resp => {
        // The Apps Script getData returns: { success: true, data: [[row0],[row1],...] }
        // Row 0 is the header row, rows 1+ are data rows
        const raw2d = resp?.data;
        if (!Array.isArray(raw2d) || raw2d.length < 2) return;

        const mapRow = r => {
          // Safely get a string value from a column index
          const g = i => String(r[i] ?? "").trim();

          const company = g(13);
          if (!company) return null;

          // Stakeholder (col 3): formats vary — "Name — Phone", "Name Phone", "Name"
          const stakeholderRaw = g(3);
          let stakeholderName = stakeholderRaw;
          let stakeholderPhone = "";
          if (stakeholderRaw.includes("—")) {
            const parts = stakeholderRaw.split("—");
            stakeholderName = parts[0].trim();
            stakeholderPhone = parts.slice(1).join("—").trim();
          } else if (/\d{4,}/.test(stakeholderRaw)) {
            // Has digits that look like a phone number — split on last word-boundary before digits
            const m = stakeholderRaw.match(/^(.*?)\s+(\d[\d\s]{6,})$/);
            if (m) { stakeholderName = m[1].trim(); stakeholderPhone = m[2].trim(); }
          }

          // Training date display: prefer Booked On Date (col 22), then Preferred Date (col 4)
          // Both may be dd/mm/yyyy or ISO
          const bookedRaw    = g(22);
          const preferredRaw = g(4);
          const trainingDate = bookedRaw || preferredRaw;

          // Human-readable date for display in the client picker and Step 1 field
          const fmtForDisplay = raw => {
            if (!raw) return "";
            // dd/mm/yyyy
            if (/^\d{2}\/\d{2}\/\d{4}/.test(raw)) {
              try {
                const [d, m, y] = raw.split("/");
                const dt = new Date(`${y}-${m}-${d}T12:00:00`);
                return dt.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
              } catch (_) { return raw; }
            }
            // ISO
            if (/^\d{4}-\d{2}-\d{2}/.test(raw)) {
              try {
                const dt = new Date(raw.slice(0, 10) + "T12:00:00");
                return dt.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
              } catch (_) { return raw; }
            }
            return raw;
          };

          // Convert raw date to yyyy-mm-dd for <input type="date">
          const toInputDate = raw => {
            if (!raw) return "";
            if (/^\d{2}\/\d{2}\/\d{4}/.test(raw)) {
              const [d, m, y] = raw.split("/");
              return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            }
            if (/^\d{4}-\d{2}-\d{2}/.test(raw)) return raw.slice(0, 10);
            return "";
          };

          // Split dates (col 24) — JSON array of ISO strings e.g. ["2026-05-05","2026-05-06",...]
          let splitDates = [];
          try { const p = JSON.parse(g(24)); if (Array.isArray(p)) splitDates = p.filter(Boolean); } catch(_) {}

          const numDays = parseInt(g(23)) || (splitDates.length > 1 ? splitDates.length : 1);

          // Build dayDates for the structure step: use splitDates if present, else use booked date for day 1
          const dayDatesArr = Array.from({ length: 5 }, (_, i) => {
            if (splitDates[i]) return toInputDate(splitDates[i]);
            if (i === 0) return toInputDate(bookedRaw || preferredRaw);
            return "";
          });

          return {
            company,
            status:          g(0),
            trainer:         g(21),
            trainingDate:    fmtForDisplay(trainingDate),
            trainingDateRaw: trainingDate,
            preferredDate:   fmtForDisplay(preferredRaw),
            goLive:          fmtForDisplay(g(18)),
            stakeholder:     stakeholderName,
            stakeholderPhone,
            email:           g(2),
            attendees:       g(8),
            familiar:        g(14),
            trainingType:    g(5),
            areas:           g(6),
            features:        g(7),
            priorities:      g(15),
            followUp:        g(16),
            location:        g(9),
            parking:         g(10),
            venueSetup:      g(11),
            anything:        g(17),
            invoice:         g(20),
            trainingDays:    numDays,
            splitDates,
            _trainingDays:   numDays,
            _dayDates:       dayDatesArr,
          };
        };

        const mapped = raw2d.slice(1).map(mapRow).filter(Boolean);
        if (mapped.length) {
          // Sort: Booked/Confirmed first, then by company name
          mapped.sort((a, b) => {
            const statusOrder = { "Booked": 0, "Confirmed": 0, "Unassigned": 1, "Pending": 2, "Cancelled": 3 };
            const sa = statusOrder[a.status] ?? 1;
            const sb = statusOrder[b.status] ?? 1;
            if (sa !== sb) return sa - sb;
            return a.company.localeCompare(b.company);
          });
          setRows(mapped);
          setUsingMock(false);
        }
      })
      .catch(err => {
        console.warn("Live data fetch failed:", err);
      })
      .finally(() => setLoading(false));
  }, []);

  const canProceed = () => {
    if (step === 0) return !!wizard.client.company;
    if (step === 1) return wizard.structure.days > 0;
    if (step === 2) return (wizard.selectedAreas.selected || []).length > 0;
    return true;
  };

  const resetWizard = () => {
    setStep(0);
    setWizard({
      client: {},
      structure: { days: 1, dayDates: [], dayTimes: Array.from({length:5}, () => ({start:"10:30",end:"16:30"})), lunchStart: "12:30", lunchDur: 30, remote: "On-site" },
      selectedAreas: { selected: [] },
      agenda: {},
      logistics: {},
    });
  };

  const STEP_COMPONENTS = [
    <StepClient key="c" data={wizard.client} onChange={setSection("client")} rows={rows} loading={loading} />,
    <StepStructure key="s" data={wizard.structure} onChange={setSection("structure")} clientData={wizard.client} />,
    <StepAreas key="a" data={wizard.selectedAreas} onChange={setSection("selectedAreas")} clientData={wizard.client} structure={wizard.structure} />,
    <StepAgenda key="ag" data={wizard.agenda} onChange={setSection("agenda")} wizard={wizard} />,
    <StepLogistics key="l" data={wizard.logistics} onChange={setSection("logistics")} clientData={wizard.client} />,
    <StepGenerate key="gen" wizard={wizard} onReset={resetWizard} />,
  ];

  const showRef = step > 0 && !!wizard.client.company;

  return (
    <div style={{ display: "flex", flexDirection: "column", minHeight: "100vh" }}>
      {/* Header */}
      <header style={{
        background: "var(--white)",
        borderBottom: "1.5px solid var(--border)",
        padding: "0 32px",
        height: 60,
        display: "flex",
        alignItems: "center",
        justifyContent: "space-between",
        position: "sticky",
        top: 0,
        zIndex: 50,
        boxShadow: "0 1px 12px rgba(18,21,42,0.06)",
      }}>
        <StreetLogo />
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          {usingMock && (
            <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.07em", color: "var(--muted)", background: "var(--bg)", border: "1px solid var(--border)", borderRadius: 6, padding: "3px 10px" }}>
              PREVIEW DATA
            </span>
          )}
          {step > 0 && step < 5 && (
            <button className="btn-ghost" onClick={resetWizard} style={{ padding: "8px 16px", fontSize: 13 }}>
              ✕ Start over
            </button>
          )}
        </div>
      </header>

      {/* Progress */}
      {step < 6 && (
        <div style={{ background: "var(--white)", borderBottom: "1.5px solid var(--border)", padding: "16px 32px" }}>
          <div style={{ maxWidth: 900, margin: "0 auto" }}>
            <ProgressStepper currentStep={step} steps={STEPS} />
            <div className="progress-bar" style={{ marginTop: 16 }}>
              <div className="progress-fill" style={{ width: `${((step) / (STEPS.length - 1)) * 100}%` }} />
            </div>
          </div>
        </div>
      )}

      {/* Body */}
      <div style={{ display: "flex", flex: 1 }}>
        {/* Main content */}
        <main style={{ flex: 1, padding: "52px 48px", maxWidth: showRef ? "calc(100% - 240px)" : "none", overflowY: "auto" }}>
          <div style={{ maxWidth: 680, margin: "0 auto" }}>
            {STEP_COMPONENTS[step]}

            {/* Navigation */}
            {step < 5 && (
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 48, paddingTop: 32, borderTop: "1.5px solid var(--border)" }}>
                <button className="btn-ghost" onClick={() => setStep(s => Math.max(0, s - 1))} style={{ visibility: step === 0 ? "hidden" : "visible" }}>
                  ← Back
                </button>
                <button
                  className="btn-primary"
                  onClick={() => setStep(s => s + 1)}
                  disabled={!canProceed()}
                  style={{ opacity: canProceed() ? 1 : 0.45 }}
                >
                  {step === 4 ? "Review & generate →" : "Continue →"}
                </button>
              </div>
            )}
            {step === 5 && (
              <div style={{ marginTop: 48, paddingTop: 32, borderTop: "1.5px solid var(--border)" }}>
                <button className="btn-ghost" onClick={() => setStep(4)}>← Back to logistics</button>
              </div>
            )}
          </div>
        </main>

        {/* Reference panel */}
        <ReferencePanel wizard={wizard} visible={showRef} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
