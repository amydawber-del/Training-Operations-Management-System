        throw new Error(errData.error?.message || `API error ${res.status}`);
      }
      const data = await res.json();
      const text = (data.content || []).map(b => b.text || "").join("").trim();
      // Strip any accidental markdown fences
      const clean = text.replace(/^```json\s*/i, "").replace(/```\s*$/,"").trim();
      const parsed = JSON.parse(clean);

      // Merge into the post notes for this client
      const postKey = `${selectedIdx}-post`;
      setAllNotes(prev => ({
        ...prev,
        [postKey]: {
          ...(prev[postKey] || {}),
          overviewNotes:    parsed.overviewNotes    || "",
          covered_settings: parsed.covered_settings || [],
          covered_sales:    parsed.covered_sales    || [],
          covered_lettings: parsed.covered_lettings || [],
          covered_pm:       parsed.covered_pm       || [],
          covered_accounting: parsed.covered_accounting || [],
          workflows:        parsed.workflows        || [],
          actionsClient:    parsed.actionsClient    || [],
          actionsStreet:    parsed.actionsStreet    || [],
          nextSteps:        parsed.nextSteps        || "",
          qa:               parsed.qa               || [],
        }
      }));
      setDone(true);
    } catch (e) {
      setError("Something went wrong generating the summary. Check your notes and try again. (" + e.message + ")");
    } finally {
      setGenerating(false);
    }
  };

  return (
    <div style={{ fontFamily: "'DM Sans', sans-serif", color: C.dark, maxWidth: 760 }}>

      {/* Header */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 12, padding: "20px 24px", marginBottom: 20, boxShadow: "0 1px 4px rgba(18,21,42,0.07)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
          <div style={{ background: C.blue, borderRadius: 8, width: 32, height: 32, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M10 2a1 1 0 011 1v1.07A7.002 7.002 0 0116.93 10H18a1 1 0 110 2h-1.07A7.002 7.002 0 0111 17.93V19a1 1 0 11-2 0v-1.07A7.002 7.002 0 013.07 12H2a1 1 0 110-2h1.07A7.002 7.002 0 019 3.07V2a1 1 0 011-1zm0 4a4 4 0 100 8 4 4 0 000-8zm0 2a2 2 0 110 4 2 2 0 010-4z" fill="white"/></svg>
          </div>
          <div>
            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 700 }}>AI Summary Pack Generator</h2>
            <div style={{ fontSize: 12, color: C.dark30, marginTop: 2 }}>{companyName} — paste your raw session notes and AI will write the full Summary Pack</div>
          </div>
        </div>
        <div style={{ background: C.blueLight, border: `1px solid ${C.blueBorder}`, borderRadius: 8, padding: "10px 14px", fontSize: 12, color: C.dark40, lineHeight: "18px" }}>
          <strong style={{ color: C.blue }}>How it works:</strong> Paste your notes from the training session below — bullet points, voice memo transcripts, rough scribbles, anything. AI will read the client context automatically and write a complete, professional Summary Pack. Switch to the <strong>Summary Pack</strong> tab to review, edit and print it.
        </div>
      </div>

      {/* Context preview */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 16, boxShadow: "0 1px 4px rgba(18,21,42,0.05)" }}>
        <div style={{ fontSize: 10, fontWeight: 700, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>Client context AI will use automatically</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
          {[
            ["Company",          companyName],
            ["Trainer",          trainerName],
            ["Areas requested",  areasStr],
            ["Top priorities",   prioritiesStr],
            ["Follow-up pref.",  followUpStr],
          ].map(([label, val]) => (
            <div key={label} style={{ background: C.grey, borderRadius: 6, padding: "8px 12px" }}>
              <div style={{ fontSize: 10, color: C.dark30, fontWeight: 600, textTransform: "uppercase", marginBottom: 2 }}>{label}</div>
              <div style={{ fontSize: 12, color: C.dark, lineHeight: "17px" }}>{val || "—"}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Notes input */}
      <div style={{ background: "#fff", border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", marginBottom: 16, boxShadow: "0 1px 4px rgba(18,21,42,0.05)" }}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.dark30, textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 8 }}>Your raw training notes</div>
        <textarea
          value={rawNotes}
          onChange={e => { setRawNotes(e.target.value); setDone(false); setError(""); }}
          placeholder={`Paste anything here — rough notes, bullet points, voice memo transcript, key moments from the session...\n\nExamples:\n- Covered lettings application workflow, team struggled with the AML tile\n- Showed how to receipt rent and allocate payments — clicked straight away\n- Sarah asked about NRL tax setup for their overseas landlords\n- Accounting go-live planned for 1st of next month\n- Action: Street to send NRL guide and reconciliation checklist`}
          style={{
            width: "100%", minHeight: 220, padding: "12px 14px",
            fontFamily: "'DM Sans', sans-serif", fontSize: 13, color: C.dark,
            background: "#FAFBFF", border: `1.5px solid ${C.border}`,
            borderRadius: 8, resize: "vertical", outline: "none", lineHeight: "20px",
          }}
          onFocus={e => e.target.style.borderColor = C.blue}
          onBlur={e => e.target.style.borderColor = C.border}
        />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 10 }}>
          <div style={{ fontSize: 11, color: C.dark20 }}>{rawNotes.length > 0 ? `${rawNotes.split(/\s+/).filter(Boolean).length} words` : "Start typing or paste notes above"}</div>
          <button
            onClick={generate}
            disabled={generating || !rawNotes.trim()}
            style={{
              background: generating ? C.dark20 : done ? C.greenDark : C.blue,
              color: "#fff", border: "none", borderRadius: 8,
              padding: "10px 22px", fontSize: 13, fontWeight: 700,
              cursor: generating || !rawNotes.trim() ? "not-allowed" : "pointer",
              display: "flex", alignItems: "center", gap: 8,
              boxShadow: generating || !rawNotes.trim() ? "none" : "0 2px 8px rgba(91,75,231,0.35)",
              transition: "all 0.2s", opacity: !rawNotes.trim() ? 0.5 : 1,
            }}
          >
            {generating ? (
              <>
                <span style={{ display: "inline-block", width: 12, height: 12, border: "2px solid rgba(255,255,255,0.35)", borderTopColor: "#fff", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
                Writing summary…
              </>
            ) : done ? (
              <><svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg> Generated — regenerate?</>
            ) : (
              <><svg width="13" height="13" viewBox="0 0 20 20" fill="none"><path d="M10 2a1 1 0 011 1v1.07A7.002 7.002 0 0116.93 10H18a1 1 0 110 2h-1.07A7.002 7.002 0 0111 17.93V19a1 1 0 11-2 0v-1.07A7.002 7.002 0 013.07 12H2a1 1 0 110-2h1.07A7.002 7.002 0 019 3.07V2a1 1 0 011-1zm0 4a4 4 0 100 8 4 4 0 000-8zm0 2a2 2 0 110 4 2 2 0 010-4z" fill="white"/></svg> Generate Summary Pack</>
            )}
          </button>
        </div>
      </div>

      {/* Error */}
      {error && (
        <div style={{ background: C.red, border: `1px solid #f9b4bc`, borderRadius: 8, padding: "10px 16px", marginBottom: 16, fontSize: 13, color: C.redDark }}>
          ⚠ {error}
        </div>
      )}

      {/* Success */}
      {done && !error && (
        <div style={{ background: C.greenBg, border: `1px solid #7bc97a`, borderRadius: 8, padding: "14px 18px", display: "flex", alignItems: "center", gap: 14 }}>
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#1B6B42" strokeWidth="1.5"/><path d="M6 10l3 3 5-5" stroke="#1B6B42" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
          <div>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.greenDark }}>Summary Pack written successfully</div>
            <div style={{ fontSize: 12, color: C.greenDark, marginTop: 2 }}>Switch to the <strong>Summary Pack</strong> tab to review, edit and print it. You can regenerate as many times as you like.</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────
function App() {
  const [rows, setRows] = useState([]);
  const [selected, setSelected] = useState(0);
  const [view, setView] = useState("client");
  const [loading, setLoading] = useState(true);
  const [usingMock, setUsingMock] = useState(false);
  const [agendaData, setAgendaData] = useState([]);
  const [agendaLoading, setAgendaLoading] = useState(true);
  const [allNotes, setAllNotes] = useState({});
  const [sidebarSearch, setSidebarSearch] = useState("");

  const isPost = view === "post-client" || view === "post-internal";
  const notesKey = isPost ? `${selected}-post` : `${selected}-${view === "ai-generator" ? "client" : view}`;
  const notes = allNotes[notesKey] || {};
  const setNotes = updater => setAllNotes(prev => ({ ...prev, [notesKey]: typeof updater === "function" ? updater(prev[notesKey] || {}) : updater }));

  useEffect(() => {
    fetch(`${SHEET_URL}?action=getData`).then(r => r.json())
      .then(data => {
        if (!data.success) throw new Error();
        const [hdrs, ...rest] = data.data;
        setRows(rest.filter(r => r.some(c => c !== "")).map(r => mapRow(hdrs, r)));
        setLoading(false);
      }).catch(() => { setRows(MOCK_ROWS); setUsingMock(true); setLoading(false); });
  }, []);

  useEffect(() => {
    fetch(AGENDA_CSV_URL).then(r => r.text()).then(text => { setAgendaData(parseCSV(text)); setAgendaLoading(false); }).catch(() => setAgendaLoading(false));
  }, []);

  // Auto-select a company when opened from the dashboard via ?company=... URL param
  useEffect(() => {
    if (rows.length === 0) return;
    const params = new URLSearchParams(window.location.search);
    const company = params.get("company");
    if (!company) return;
    const idx = rows.findIndex(r =>
      (r[HEADER_MAP.company] || "").toLowerCase() === company.toLowerCase()
    );
    if (idx !== -1) setSelected(idx);
  }, [rows]);

  const currentRow = rows[selected];
  const areasRaw = currentRow ? h(currentRow, "areas") : "—";
  const agendaBlocks = useMemo(() => agendaData.length ? buildAgendaFromAreas(areasRaw, agendaData) : [], [areasRaw, agendaData]);
  const riskLevel = getRiskLevel(allNotes[`${selected}-post`] || {});

  const TAB_GROUPS = [
    { label: "Pre-Training",  tabs: [{ id: "client",        label: "Client Doc"       }] },
    { label: "Post-Training", tabs: [{ id: "ai-generator",  label: "✦ AI Summary"     }, { id: "post-client", label: "Summary Pack" }, { id: "post-internal", label: "Internal Debrief" }] },
  ];

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', system-ui, Arial, sans-serif; font-size: 14px; line-height: 20px; color: #12152A; background: #F4F5FA; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: #F4F5FA; } ::-webkit-scrollbar-thumb { background: #C9C4F8; border-radius: 10px; }
        .sb-btn:hover { background: #F0EFFE !important; border-color: #C9C4F8 !important; }
        .tab-btn:hover { color: #5B4BE7 !important; background: #F0EFFE !important; }
        .tab-btn-ai { background: linear-gradient(135deg, rgba(91,75,231,0.3), rgba(139,92,246,0.3)) !important; }
        .print-btn:hover { background: #4538D4 !important; }
        .notes-input:focus { border-color: #5B4BE7 !important; background: #FFFBF0 !important; }
        input[type=number]::-webkit-inner-spin-button { opacity: 1; }
        input, textarea, select { font-family: 'DM Sans', system-ui, Arial, sans-serif !important; }
        button { font-family: 'DM Sans', system-ui, Arial, sans-serif !important; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print {
          .no-print { display: none !important; }
          .notes-print-hide { display: none !important; }
          .notes-screen-only { display: none !important; }
          .notes-print-only { display: block !important; }
          body { background: white !important; font-family: Arial, sans-serif !important; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
      `}</style>

      <div className="print-layout-outer" style={{ minHeight: "100vh", background: "#F4F5FA", display: "flex", flexDirection: "column" }}>
        {/* Topbar */}
        <div className="no-print" style={{ background: C.nav, borderBottom: "none", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, height: 56, position: "sticky", top: 0, zIndex: 100, boxShadow: "0 2px 12px rgba(18,21,42,0.18)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
            <StreetLogo />
            <div style={{ width: 1, height: 18, background: "rgba(255,255,255,0.15)" }} />
            <span style={{ fontSize: 12, color: "rgba(255,255,255,0.55)", fontWeight: 500 }}>Training Doc Generator</span>
            {usingMock && <span style={{ fontSize: 10, color: "rgba(255,255,255,0.5)", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 5, padding: "2px 8px", fontWeight: 600, letterSpacing: "0.05em" }}>PREVIEW</span>}
          </div>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {TAB_GROUPS.map(group => (
              <div key={group.label} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 9, color: "rgba(255,255,255,0.35)", textTransform: "uppercase", letterSpacing: "0.07em", marginRight: 2, whiteSpace: "nowrap", fontWeight: 600 }}>{group.label}</span>
                <div style={{ display: "flex", background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.14)", borderRadius: 8, overflow: "hidden" }}>
                  {group.tabs.map((tab, i) => (
                    <button key={tab.id} className="tab-btn" onClick={() => setView(tab.id)} style={{
                      background: view === tab.id ? "rgba(255,255,255,0.15)" : "transparent",
                      color: view === tab.id ? "#fff" : "rgba(255,255,255,0.55)",
                      border: "none", borderRight: i < group.tabs.length - 1 ? "1px solid rgba(255,255,255,0.10)" : "none",
                      padding: "6px 13px", cursor: "pointer", fontSize: 11,
                      fontWeight: view === tab.id ? 700 : 400, fontFamily: "'DM Sans', sans-serif",
                      boxShadow: "none", whiteSpace: "nowrap"
                    }}>
                      {tab.id === "post-internal" && riskLevel === "high" && <span style={{ display: "inline-block", width: 6, height: 6, borderRadius: "50%", background: C.redDark, marginRight: 5, marginBottom: 1 }} />}
                      {tab.label}
                    </button>
                  ))}
                </div>
              </div>
            ))}
            <button className="print-btn" onClick={() => {
                // Set document title for PDF filename
                const tabLabels = { client: "Client Doc", "ai-generator": "AI Summary Generator", "post-client": "Summary Pack", "post-internal": "Internal Debrief" };
                const company = currentRow ? h(currentRow, "company") : "Street Training";
                const docType = tabLabels[view] || "Document";
                const prevTitle = document.title;
                document.title = company + " - " + docType;

                // Temporarily strip height/overflow constraints that cause blank first pages
                const outer = document.querySelector(".print-layout-outer");
                const body  = document.querySelector(".print-layout-body");
                const main  = document.querySelector(".print-layout-main");
                const saved = [];
                [
                  [outer, { minHeight: "", height: "", overflow: "", display: "block" }],
                  [body,  { minHeight: "", height: "", overflow: "", display: "block", flex: "" }],
                  [main,  { minHeight: "", height: "", maxHeight: "", overflowY: "", flex: "", padding: "26px 38px" }],
                ].forEach(([el, patch]) => {
                  if (!el) return;
                  const orig = {};
                  Object.keys(patch).forEach(k => { orig[k] = el.style[k]; el.style[k] = patch[k]; });
                  saved.push([el, orig]);
                });

                window.print();

                // Restore everything
                document.title = prevTitle;
                saved.forEach(([el, orig]) => Object.keys(orig).forEach(k => { el.style[k] = orig[k]; }));
              }} style={{ background: "#5B4BE7", color: "#fff", border: "none", borderRadius: 8, padding: "8px 16px", fontSize: 12, fontWeight: 600, cursor: "pointer", fontFamily: "'DM Sans', sans-serif", display: "flex", alignItems: "center", gap: 6, whiteSpace: "nowrap", boxShadow: "0 2px 8px rgba(91,75,231,0.35)" }}>
              <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 10H1.5A.5.5 0 011 9.5V5.5A2 2 0 013 3.5h8A2 2 0 0113 5.5v4a.5.5 0 01-.5.5H11" stroke="white" strokeLinecap="round" strokeLinejoin="round"/><rect x="3" y="9.5" width="8" height="4" rx=".5" stroke="white"/><path d="M3 3.5V2a.5.5 0 01.5-.5h7a.5.5 0 01.5.5v1.5" stroke="white" strokeLinecap="round"/></svg>
              Print / Save PDF
            </button>
          </div>
        </div>

        <div className="print-layout-body" style={{ display: "flex", flex: 1, background: "#F4F5FA" }}>
          {/* Sidebar */}
          <div className="no-print" style={{ width: 240, background: "#fff", borderRight: `1px solid ${C.border}`, padding: "14px 10px", flexShrink: 0, overflowY: "auto", display: "flex", flexDirection: "column" }}>
            {/* Search input */}
            <div style={{ position: "relative", marginBottom: 10 }}>
              <svg width="13" height="13" viewBox="0 0 14 14" fill="none" style={{ position: "absolute", left: 9, top: "50%", transform: "translateY(-50%)", pointerEvents: "none" }}>
                <circle cx="6" cy="6" r="4.5" stroke={C.dark20} strokeWidth="1.4"/>
                <path d="M10 10l2.5 2.5" stroke={C.dark20} strokeWidth="1.4" strokeLinecap="round"/>
              </svg>
              <input
                type="text"
                placeholder="Search clients..."
                value={sidebarSearch}
                onChange={e => setSidebarSearch(e.target.value)}
                style={{ width: "100%", padding: "7px 28px 7px 28px", fontSize: 12, fontFamily: "'DM Sans', sans-serif", border: `1px solid ${C.border}`, borderRadius: 8, background: "#fff", color: C.dark, outline: "none" }}
                onFocus={e => e.target.style.borderColor = "#5B4BE7"}
                onBlur={e => e.target.style.borderColor = C.border}
              />
              {sidebarSearch && (
                <button onClick={() => setSidebarSearch("")} style={{ position: "absolute", right: 7, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", cursor: "pointer", color: C.dark20, fontSize: 14, lineHeight: 1, padding: "0 2px" }}>x</button>
              )}
            </div>
            {/* Record count */}
            <div style={{ fontSize: 9, color: C.dark30, letterSpacing: "0.09em", textTransform: "uppercase", marginBottom: 10, padding: "2px 6px", fontWeight: 700 }}>
              {sidebarSearch
                ? rows.filter((r, i) => { const name = h(r, "company") !== "—" ? h(r, "company") : `Row ${i+1}`; return name.toLowerCase().includes(sidebarSearch.toLowerCase()); }).length + " of " + rows.length + " records"
                : "Records (" + rows.length + ")"}
            </div>
            {loading && <div style={{ color: C.dark20, fontSize: 12, paddingTop: 20, textAlign: "center" }}>Loading...</div>}
            {rows.map((r, i) => {
              const name = h(r, "company") !== "—" ? h(r, "company") : `Row ${i + 1}`;
              const trainer = h(r, "trainer") !== "—" ? h(r, "trainer") : "";
              const status = h(r, "status");
              const rowRisk = getRiskLevel(allNotes[`${i}-post`] || {});
              const isSel = selected === i;
              if (sidebarSearch && !name.toLowerCase().includes(sidebarSearch.toLowerCase())) return null;
              return (
                <button key={i} className="sb-btn" onClick={() => setSelected(i)} style={{ width: "100%", textAlign: "left", background: isSel ? C.blueLight : "transparent", border: isSel ? `1px solid ${C.blueBorder}` : "1px solid transparent", borderRadius: 10, padding: "10px 10px", cursor: "pointer", marginBottom: 3, boxShadow: isSel ? "0 2px 8px rgba(91,75,231,0.10)" : "none", flexShrink: 0 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    {rowRisk === "high" && <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.redDark, flexShrink: 0 }} />}
                    <div style={{ fontSize: 12, fontWeight: 600, color: isSel ? C.dark : C.dark40, lineHeight: 1.3 }}>{name}</div>
                  </div>
                  <div style={{ display: "flex", gap: 5, marginTop: 4, alignItems: "center", flexWrap: "wrap" }}>
                    {trainer && <span style={{ fontSize: 10, color: isSel ? C.blue : C.dark30 }}>{trainer}</span>}
                    {status && status !== "—" && (
                      <span style={{ fontSize: 9, fontWeight: 600, background: status === "Confirmed" ? C.greenBg : C.amber, color: status === "Confirmed" ? C.greenDark : C.amberDark, borderRadius: 5, padding: "1px 5px" }}>{status.toUpperCase()}</span>
                    )}
                  </div>
                </button>
              );
            })}
            {sidebarSearch && !rows.some((r, i) => { const name = h(r, "company") !== "—" ? h(r, "company") : `Row ${i+1}`; return name.toLowerCase().includes(sidebarSearch.toLowerCase()); }) && (
              <div style={{ fontSize: 12, color: C.dark20, textAlign: "center", paddingTop: 20 }}>No clients found</div>
            )}
          </div>

          {/* Main */}
          <div className="print-layout-main" style={{ flex: 1, padding: "28px 40px", maxWidth: view === "client" ? "none" : 900, overflowY: "auto", background: "#F4F5FA" }}>
            {!loading && currentRow && (
              <div className="no-print" style={{ background: "#FFFBEA", border: "1px dashed #B8A526", borderRadius: 8, padding: "8px 14px", marginBottom: 16, display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.yellow, flexShrink: 0 }} />
                <span style={{ fontSize: 12, color: "#6b5e00" }}>Yellow dashed fields are editable and print with the document. All structured selections feed into your Data_Engine spreadsheet tab.</span>
              </div>
            )}
            {loading && <div style={{ color: C.dark20, fontSize: 14, paddingTop: 60, textAlign: "center" }}>Loading…</div>}
            {!loading && currentRow && view === "ai-generator" && <AISummaryGenerator row={currentRow} allNotes={allNotes} setAllNotes={setAllNotes} selectedIdx={selected} />}
            {!loading && currentRow && view === "client" && <ClientView row={currentRow} notes={notes} setNotes={setNotes} />}
            {!loading && currentRow && view === "post-client" && <PostTrainingClientView row={currentRow} agendaBlocks={agendaBlocks} agendaLoading={agendaLoading} notes={notes} setNotes={setNotes} />}
            {!loading && currentRow && view === "post-internal" && <PostTrainingInternalView row={currentRow} notes={notes} setNotes={setNotes} />}
            {!loading && rows.length === 0 && <div style={{ color: C.dark20, fontSize: 14, paddingTop: 60, textAlign: "center" }}>No records found.</div>}
          </div>
        </div>
      </div>
    </>
  );
}
